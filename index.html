.upload-zone:hover, .upload-zone:active { border-color: #1a1a1a; background: #f4f3ef; }
.upload-zone .icon { font-size: 40px; margin-bottom: 10px; }
.upload-zone .title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.upload-zone .sub { color: #999; font-size: 13px; }
.btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
.btn-dark { background: #1a1a1a; color: #fff; }
.btn-green { background: #1e7e34; color: #fff; }
.btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
.btn:hover { opacity: 0.88; }

.date-row label { font-weight: 700; font-size: 15px; min-width: 50px; }

.loading { text-align: center; padding: 32px; color: #666; }

@keyframes spin { to { transform: rotate(360deg); } }
.error { padding: 12px 16px; background: #fff0f0; border-radius: 8px; color: #c00; font-size: 14px; margin-top: 12px; }

.preview-img { width: 100%; border-radius: 8px; border: 1px solid #eee; margin-bottom: 12px; }
canvas { display: none; }

.img-fab { position: fixed; right: 14px; bottom: 18px; z-index: 60; background: #1a1a1a; color: #fff; border: none; border-radius: 24px; padding: 12px 16px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
.img-panel { position: fixed; left: 0; right: 0; bottom: 0; height: 50vh; background: #111; z-index: 50; border-top: 3px solid #1a1a1a; overflow: hidden; touch-action: none; }
.img-panel img { display: block; width: 100%; height: auto; transform-origin: 0 0; }
body.panel-open main { padding-bottom: 52vh; }
.api-key-row { display: flex; gap: 8px; margin-bottom: 16px; }

.api-key-row .save-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
.api-note { font-size: 12px; color: #888; margin-bottom: 16px; }
.step-indicator { display: flex; gap: 8px; margin-bottom: 18px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.step-dot.active { background: #1a1a1a; }

// ── pinch zoom (pointer events, with clamping & smooth 2→1 finger handoff) ──
function bindPinchZoom() {
  const panel = document.getElementById("imgPanel");
  const img = document.getElementById("panelImg");
  if (!panel || !img) return;

  let scale = 1, tx = 0, ty = 0;
  const pointers = new Map();          // pointerId -> {x, y}
  let gStartDist = 0, gStartScale = 1, gStartTx = 0, gStartTy = 0, gStartMid = null;
  let pStart = null;                   // single-finger pan start {x, y, tx, ty}

  function clampAndApply() {
    const pw = panel.clientWidth, ph = panel.clientHeight;
    const iw = pw * scale;                       // displayed image width
    const ih = (img.naturalHeight / img.naturalWidth) * iw;
    // keep image covering the panel: don't let edges drift inside
    const minTx = Math.min(0, pw - iw), maxTx = 0;
    const minTy = Math.min(0, ph - ih), maxTy = Math.max(0, ph - ih);
    tx = Math.max(minTx, Math.min(maxTx, tx));
    ty = Math.max(minTy, Math.min(ih <= ph ? maxTy : 0, ty));
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function mid(p1, p2) { return { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2 }; }
  function dist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
  function rel(e) {
    const r = panel.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  panel.addEventListener("pointerdown", e => {
    panel.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, rel(e));
    const pts = [...pointers.values()];
    if (pts.length === 2) {
      gStartDist = dist(pts[0], pts[1]);
      gStartScale = scale; gStartTx = tx; gStartTy = ty;
      gStartMid = mid(pts[0], pts[1]);
      pStart = null;
    } else if (pts.length === 1) {
      pStart = { x: pts[0].x, y: pts[0].y, tx, ty };
    }
  });

  panel.addEventListener("pointermove", e => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, rel(e));
    const pts = [...pointers.values()];
    if (pts.length === 2 && gStartDist > 0) {
      const d = dist(pts[0], pts[1]);
      const m = mid(pts[0], pts[1]);
      const newScale = Math.min(8, Math.max(1, gStartScale * d / gStartDist));
      const k = newScale / gStartScale;
      // zoom anchored at gesture-start midpoint + follow midpoint movement
      tx = m.x - (gStartMid.x - gStartTx) * k;
      ty = m.y - (gStartMid.y - gStartTy) * k;
      scale = newScale;
      clampAndApply();
    } else if (pts.length === 1 && pStart && scale > 1) {
      tx = pStart.tx + (pts[0].x - pStart.x);
      ty = pStart.ty + (pts[0].y - pStart.y);
      clampAndApply();
    }
  });

  function lift(e) {
    pointers.delete(e.pointerId);
    const pts = [...pointers.values()];
    if (pts.length === 1) {
      // 2→1 handoff: re-anchor pan to the remaining finger (prevents freeze/jump)
      pStart = { x: pts[0].x, y: pts[0].y, tx, ty };
      gStartDist = 0;
    } else if (pts.length === 0) {
      pStart = null; gStartDist = 0;
      if (scale <= 1.02) { scale = 1; tx = 0; ty = 0; clampAndApply(); }

// ── Image enhancement: grayscale + contrast + sharpen (no resize) ──
async function enhanceImage() {
  const img = new Image();
  img.src = "data:" + state.imgMime + ";base64," + state.imgB64;
  await new Promise(res => img.onload = res);

  const c = document.createElement("canvas");
  c.width = img.width; c.height = img.height; // keep original size
  const ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);

  let d = ctx.getImageData(0, 0, c.width, c.height);
  const px = d.data, w = c.width, h = c.height;

  // 1) grayscale + contrast
  const contrast = 1.35, mid = 128;
  for (let i = 0; i < px.length; i += 4) {
    let g = 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
    g = (g - mid) * contrast + mid;
    g = g < 0 ? 0 : g > 255 ? 255 : g;
    px[i] = px[i+1] = px[i+2] = g;
  }

  // 2) sharpen (3x3 kernel) on grayscale channel
  const src = new Uint8ClampedArray(px);
  const k = [0,-1,0,-1,5,-1,0,-1,0];
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      let sum = 0, ki = 0;
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++)
          sum += src[((y+dy)*w + (x+dx))*4] * k[ki++];
      const i = (y*w + x)*4;
      const v = sum < 0 ? 0 : sum > 255 ? 255 : sum;
      px[i] = px[i+1] = px[i+2] = v;
    }
  }
  ctx.putImageData(d, 0, 0);

  const dataUrl = c.toDataURL("image/jpeg", 0.92);
  state.imgB64 = dataUrl.split(",")[1];
  state.imgMime = "image/jpeg";
  setState({ enhanced: true });
}

// ── ตรวจหาเส้นดำหนา (extra bold) แนวตั้งที่คั่น 3 บล็อก ──
// คืน array x-fraction ของเส้น (คาดหวัง 2 เส้น) ; ถ้าไม่เจอเส้นหนาชัดเจน คืน []
async function detectColumnDividers(b64, mime) {
  const img = new Image();
  img.src = "data:" + mime + ";base64," + b64;
  await new Promise(res => img.onload = res);

  const scale = Math.min(1, 1400 / img.width);
  const W = Math.max(1, Math.round(img.width * scale));
  const H = Math.max(1, Math.round(img.height * scale));
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0, W, H);
  const px = ctx.getImageData(0, 0, W, H).data;

  // สัดส่วนพิกเซลเข้มต่อคอลัมน์ (ดูช่วงสูง 8%–92% เลี่ยงขอบบน/ล่าง)
  const yA = Math.floor(H * 0.08), yB = Math.floor(H * 0.92), span = yB - yA;
  const DARK = 110;
  const frac = new Float32Array(W);
  for (let x = 0; x < W; x++) {
    let d = 0;
    for (let y = yA; y < yB; y++) {
      const i = (y * W + x) * 4;
      const g = (px[i] * 299 + px[i + 1] * 587 + px[i + 2] * 114) / 1000;
      if (g < DARK) d++;
    }
    frac[x] = d / span;
  }

  // จับกลุ่มคอลัมน์ที่เข้มต่อเนื่อง >60% ของความสูง = เส้นแนวตั้ง
  const TH = 0.60;
  const clusters = [];
  let s = -1;
  for (let x = 0; x < W; x++) {
    if (frac[x] >= TH) { if (s < 0) s = x; }
    else { if (s >= 0) { clusters.push([s, x - 1]); s = -1; } }
  }
  if (s >= 0) clusters.push([s, W - 1]);

  // เส้นหนาพิเศษต้องกว้างกว่าเส้นตารางปกติชัดเจน (>=0.22% ของความกว้าง) และไม่ใช่ขอบสุด
  const STRONG = Math.max(3, W * 0.0022);
  let cand = clusters
    .map(([a, b]) => ({ x: ((a + b) / 2) / W, w: (b - a + 1) }))
    .filter(o => o.w >= STRONG && o.x > 0.12 && o.x < 0.92);

  if (cand.length < 2) return []; // ไม่เจอเส้นหนา → ให้ fallback

  // เรียงตามตำแหน่ง x
  cand.sort((p, q) => p.x - q.x);
  const xs = cand.map(o => o.x);

  // เลือก 2 เส้นที่แบ่งกระดาษเป็น 3 บล็อกได้สมเหตุสมผลที่สุด
  // (โครงกระดาษ: เส้นคั่นบล็อก1/2 อยู่ ~40%, เส้นคั่นบล็อก2/3 อยู่ ~68%)
  // เลือกเส้นที่ใกล้เป้าหมายแต่ละจุดมากที่สุด แทนการเลือก "หนาสุด" (เลี่ยงจับเส้นขอบ/เส้นในตาราง)
  const TARGET1 = 0.40, TARGET2 = 0.68;
  let l1 = xs.reduce((best, x) => Math.abs(x - TARGET1) < Math.abs(best - TARGET1) ? x : best, xs[0]);
  let l2 = xs.reduce((best, x) => Math.abs(x - TARGET2) < Math.abs(best - TARGET2) ? x : best, xs[xs.length - 1]);

  // กันเลือกเส้นเดียวกันหรือสลับ: l1 ต้องอยู่ซ้ายของ l2 พอควร
  if (l2 - l1 < 0.12) {
    // ตกกรณีผิดปกติ → ใช้เส้นซ้ายสุดที่ >0.25 และขวาสุดที่ <0.85 แทน
    const left = xs.filter(x => x > 0.25 && x < 0.55);
    const right = xs.filter(x => x > 0.55 && x < 0.85);
    if (left.length && right.length) { l1 = left[0]; l2 = right[right.length - 1]; }
    else return []; // หาคู่ที่เหมาะไม่ได้ → fallback
  }
  return [l1, l2];
}

// คำนวณขอบ x ของ 3 บล็อกจากตำแหน่งเส้น (เผื่อขอบเล็กน้อยกันตัดคอลัมน์)
function blockBoundsFromLines(lines) {
  const pad = 0.012;
  const l1 = lines[0], l2 = lines[1];
  return [
    [0.0,            Math.min(1, l1 + pad)],   // บล็อกซ้าย: ขอบซ้าย → เส้น1
    [Math.max(0, l1 - pad), Math.min(1, l2 + pad)], // บล็อกกลาง: เส้น1 → เส้น2
    [Math.max(0, l2 - pad), 1.0],              // บล็อกขวา: เส้น2 → ขอบขวา
  ];
}
async function cropStrip(b64, mime, x0, x1, y0, y1) {
  const img = new Image();
  img.src = "data:" + mime + ";base64," + b64;
  await new Promise(res => img.onload = res);
  if (y0 == null) y0 = 0;
  if (y1 == null) y1 = 1;
  const sx = Math.floor(img.width  * x0), sw = Math.floor(img.width  * (x1 - x0));
  const sy = Math.floor(img.height * y0), sh = Math.floor(img.height * (y1 - y0));
  const c = document.createElement("canvas");
  c.width = sw; c.height = sh;
  const ctx = c.getContext("2d");
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
  return c.toDataURL("image/jpeg", 0.95).split(",")[1];
}

async function callApi(b64, prompt, maxTokens) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": state.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-opus-4-5",
      max_tokens: maxTokens || 6000,
      messages: [{ role: "user", content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: b64 } },
        { type: "text", text: prompt }
      ]}]
    })
  });
  const json = await resp.json();
  if (json.error) throw new Error("API: " + (json.error.message || JSON.stringify(json.error)));
  const text = json.content?.find(c => c.type === "text")?.text || "";
  const clean = text.replace(/```json|```/g, "").trim();
  try {
    return JSON.parse(clean);
  } catch (e) {
    throw new Error("ผลไม่ใช่ JSON: " + clean.slice(0, 150));
  }
}

// ── ย่อ + แปลงเป็น JPEG มาตรฐานก่อนส่ง API ──
// กันปัญหา: (1) ภาพใหญ่เกินลิมิต API (2) media_type ไม่ตรง (เช่นไฟล์ PNG แต่ส่งบอกว่า jpeg)
async function normalizeImage(b64, mime) {
  const img = new Image();
  img.src = "data:" + mime + ";base64," + b64;
  await new Promise((res, rej) => { img.onload = res; img.onerror = () => rej(new Error("โหลดรูปไม่ได้")); });
  const maxSide = 1568;
  let w = img.width, h = img.height;
  const scale = Math.min(1, maxSide / Math.max(w, h));
  w = Math.max(1, Math.round(w * scale));
  h = Math.max(1, Math.round(h * scale));
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const ctx = c.getContext("2d");
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img, 0, 0, w, h);
  return c.toDataURL("image/jpeg", 0.92).split(",")[1];
}

async function parseImage(b64, mime) {
  try {
    // ย่อ+แปลงเป็น JPEG มาตรฐานก่อน (กันภาพใหญ่เกิน/ฟอร์แมตผิด)
    const norm = await normalizeImage(b64, mime);
    // อ่านภาพเต็มทั้งใบครั้งเดียว — ให้โมเดลเห็นบริบทครบ
    const parsed = await callApi(norm, fullPrompt(), 8000);

    const rows = {};
    Object.keys(ENTRY_MAP).forEach(k => {
      if (k === "วันที่" || FINANCE_ITEMS.includes(k)) return;
      rows[k] = { open:0, refill:0, test:0, sale:0, close:0 };
    });
    let date = "", finance = {};
    FINANCE_ITEMS.forEach(k => finance[k] = 0);

    let matched = 0;
    if (parsed.date) date = parsed.date;
    if (parsed.items) Object.entries(parsed.items).forEach(([k, v]) => {
      if (!rows[k]) return;
      rows[k] = {
        open: Number(v.open)||0, refill: Number(v.refill)||0,
        test: Number(v.test)||0, sale: Number(v.sale)||0, close: Number(v.close)||0
      };
      matched++;
    });
    if (parsed.finance) Object.entries(parsed.finance).forEach(([k, v]) => {
      if (FINANCE_ITEMS.includes(k)) finance[k] = Number(v)||0;
    });

    // ถ้าไม่ match รายการเลย = อ่านไม่ออก/ผลผิดปกติ → แจ้ง ไม่ใช่โชว์ 0 เงียบๆ
    if (matched === 0) {
      throw new Error("อ่านได้ 0 รายการ — โมเดลคืน: " + JSON.stringify(parsed).slice(0, 200));
    }

    setState({ date, rows, finance, cropMode: "ภาพเต็ม (อ่านครั้งเดียว)", step: "confirm" });
  } catch (err) {
    setState({ step: "upload", error: "อ่านรูปไม่สำเร็จ: " + err.message });
  }
}

// ── (สำรอง) วิธีหั่นภาพ 6 โซน — เก็บไว้เผื่ออยากกลับไปใช้ ──
async function parseImageStrips(b64, mime) {
  try {
    let bounds, mode;
    const lines = await detectColumnDividers(b64, mime);
    if (lines.length >= 2) {
      bounds = blockBoundsFromLines(lines);
      mode = "เส้น (" + lines.map(l => Math.round(l*100)+"%").join(", ") + ")";
    } else {
      bounds = null;
      mode = "สัดส่วนสำรอง (ไม่พบเส้นหนา)";
    }

    const strips = await Promise.all(STRIP_DEFS.map(d => {
      const bx = bounds ? bounds[d.block] : [d.fx0, d.fx1];
      return cropStrip(b64, mime, bx[0], bx[1], d.y0, d.y1);
    }));
    const results = await Promise.all(strips.map((s, i) => callApi(s, stripPrompt(STRIP_DEFS[i]))));

    const rows = {};
    Object.keys(ENTRY_MAP).forEach(k => {
      if (k === "วันที่" || FINANCE_ITEMS.includes(k)) return;
      rows[k] = { open:0, refill:0, test:0, sale:0, close:0 };
    });
    const seen = {};
    let date = "", finance = {};
    FINANCE_ITEMS.forEach(k => finance[k] = 0);

    results.forEach(parsed => {
      if (parsed.date) date = parsed.date;
      if (parsed.items) Object.entries(parsed.items).forEach(([k, v]) => {
        if (!rows[k]) return;
        const cand = {
          open: Number(v.open)||0, refill: Number(v.refill)||0,
          test: Number(v.test)||0, sale: Number(v.sale)||0, close: Number(v.close)||0
        };
        const candSum = cand.open + cand.refill + cand.test + cand.sale + cand.close;
        if (seen[k] && candSum === 0) return;
        rows[k] = cand;
        if (candSum > 0) seen[k] = true;
      });
      if (parsed.finance) Object.entries(parsed.finance).forEach(([k, v]) => {
        if (FINANCE_ITEMS.includes(k)) finance[k] = Number(v)||0;
      });
    });

    setState({ date, rows, finance, cropMode: mode, step: "confirm" });
  } catch (err) {
    setState({ step: "upload", error: "อ่านรูปไม่สำเร็จ: " + err.message });
  }
}

function updateCell(key, field, val) {
  if (!state.rows[key]) state.rows[key] = {open:0,refill:0,test:0,sale:0,close:0};
  state.rows[key][field] = Number(val)||0;
  const r = state.rows[key];
  // update total cell
  const totCell = document.querySelector(`[data-tot="${key}"]`);
  const tot = rowTotal(r);
  if (totCell) { totCell.textContent = tot||'-'; totCell.style.color = tot>0?'#166534':'#ccc'; }
  // update mismatch highlight
  const tr = document.querySelector(`tr[data-key="${key}"]`);
  if (tr) {
    tr.className = (isMismatch(r)?'mismatch ':'') + (tot>0?'sold-row':'');
  }
}

function handleConfirm() {
  const dateEl = document.getElementById("dateInput");
  if (dateEl) state.date = dateEl.value;
  const url = buildFormUrl();
  const jpeg = drawJpeg();
  setState({ formUrl: url, jpegUrl: jpeg, step: "done", stockStatus: "sending", stockMsg: "" });
  sendToStock();
}

function resetApp() {
  setState({ step: "upload", date:"", rows:{}, finance:{}, formUrl:"", jpegUrl:"", error:"", enhanced:false, imgB64:null, stockStatus:"", stockMsg:"" });
}

// ============================================================
// STOCK WEBHOOK  (ส่ง Test+ขาย รวม + การเงิน เข้า tab Stock Dairy)
// ============================================================
function buildStockPayload() {
  const values = {};
  Object.entries(ENTRY_MAP).forEach(([label]) => {
    if (label === "วันที่") return;
    if (FINANCE_ITEMS.includes(label)) values[label] = state.finance[label] || 0;
    else values[label] = rowTotal(state.rows[label]);
  });
  return { date: state.date || "", values };
}

async function sendToStock() {
  try {
    // ส่งเป็น text/plain เพื่อเลี่ยง CORS preflight (Apps Script รองรับแบบนี้)
    const resp = await fetch(STOCK_WEBHOOK, {
      method: "POST",
      body: JSON.stringify(buildStockPayload())
    });
    const json = await resp.json();
    if (json.ok) setState({ stockStatus: "ok", stockMsg: "ลงแถวที่ " + json.row + " ใน Stock Dairy แล้ว" });
    else setState({ stockStatus: "fail", stockMsg: json.error || "ไม่ทราบสาเหตุ" });
  } catch (err) {
    setState({ stockStatus: "fail", stockMsg: err.message });
  }
}

function retryStock() {
  setState({ stockStatus: "sending", stockMsg: "" });
  sendToStock();
}

// ============================================================
// FORM URL  (uses test+sale total, finance as-is)
// ============================================================
function buildFormUrl() {
  const params = [`entry.37045481=${encodeURIComponent(state.date||"")}`];
  Object.entries(ENTRY_MAP).forEach(([label, entryId]) => {
    if (label === "วันที่") return;
    let val;
    if (FINANCE_ITEMS.includes(label)) val = state.finance[label]||0;
    else val = rowTotal(state.rows[label]);
    params.push(`${entryId}=${encodeURIComponent(val)}`);
  });
  return FORM_BASE + "&" + params.join("&");
}

// ============================================================
// JPEG  (shows total = test+sale per item)
// ============================================================
function drawJpeg() {
  const data = {};
  Object.keys(state.rows).forEach(k => data[k] = rowTotal(state.rows[k]));
  data["ปิดรอบเงินสด"] = state.finance["ปิดรอบเงินสด"]||0;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 1080; canvas.height = 1080;
  const white="#ffffff", border="#e0e0e0", secBg="#f0f0eb";
  const textDark="#111", textMid="#333", textLight="#aaa", textNone="#ccc";

  ctx.fillStyle=secBg; ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle=white; ctx.fillRect(0,0,1080,72);
  ctx.strokeStyle=border; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,72); ctx.lineTo(1080,72); ctx.stroke();
  ctx.fillStyle=textLight; ctx.font="bold 11px sans-serif"; ctx.fillText("สรุปยอดขาย",36,26);
  ctx.fillStyle=textDark; ctx.font="bold 32px sans-serif"; ctx.fillText(state.date||"",36,58);
  ctx.fillStyle=textLight; ctx.font="13px sans-serif";
  const sub="Test + ขาย"; ctx.fillText(sub,1080-36-ctx.measureText(sub).width,58);

  ctx.fillStyle=white; ctx.fillRect(0,1020,1080,60);
  ctx.strokeStyle=border; ctx.beginPath(); ctx.moveTo(0,1020); ctx.lineTo(1080,1020); ctx.stroke();
  ctx.fillStyle=textLight; ctx.font="12px sans-serif"; ctx.fillText("ปิดรอบเงินสด",36,1042);
  ctx.fillStyle=textDark; ctx.font="bold 18px sans-serif";
  ctx.fillText(Number(data["ปิดรอบเงินสด"]||0).toLocaleString()+" บาท",36,1062);

  const colW=360, bodyH=948;
  const cols=[COL1,COL2,COL3];
  const secLabels=[["กลุ่มที่ 1",17,"อื่นๆ"],["Bon Bon",15,"Almond เคลือบช็อก"],["อื่นๆ 2",22,"กลุ่มที่ 4"]];

  cols.forEach((items,ci)=>{
    const x=ci*colW;
    ctx.fillStyle=white; ctx.fillRect(x,72,colW,bodyH);
    if(ci>0){ctx.strokeStyle="#e8e8e8";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,72);ctx.lineTo(x,1020);ctx.stroke();}
    const rowH=bodyH/(items.length+2);
    let ri=0;
    const drawSec=(label)=>{const y=72+ri*rowH;ctx.fillStyle=secBg;ctx.fillRect(x,y,colW,rowH*0.85);ctx.fillStyle="#999";ctx.font="bold 11px sans-serif";ctx.fillText(label.toUpperCase(),x+18,y+rowH*0.6);ri++;};
    const drawRow=(label,key)=>{const y=72+ri*rowH;const val=data[key];const hasVal=val&&Number(val)>0;
      ctx.fillStyle=ri%2===0?"#fafafa":white;ctx.fillRect(x,y,colW,rowH);
      ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y+rowH);ctx.lineTo(x+colW,y+rowH);ctx.stroke();
      ctx.fillStyle=textMid;ctx.font="25px sans-serif";ctx.fillText(label,x+18,y+rowH*0.68);
      const vStr=hasVal?String(val):"-";ctx.fillStyle=hasVal?textDark:textNone;ctx.font=hasVal?"bold 27px sans-serif":"25px sans-serif";
      ctx.fillText(vStr,x+colW-18-ctx.measureText(vStr).width,y+rowH*0.68);ri++;};
    const [s1,n1,s2]=secLabels[ci];
    drawSec(s1); items.slice(0,n1).forEach(([l,k])=>drawRow(l,k));
    drawSec(s2); items.slice(n1).forEach(([l,k])=>drawRow(l,k));
  });
  return canvas.toDataURL("image/jpeg",0.94);
}
