* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; min-height: 100vh; }
header { background: #1a1a1a; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 20px; font-weight: 800; }
header span { margin-left: auto; font-size: 13px; color: #888; }
main { max-width: 960px; margin: 0 auto; padding: 20px 12px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
.card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.card p { color: #666; font-size: 14px; margin-bottom: 18px; }
.upload-zone { display: block; border: 2px solid #e4e2dc; border-radius: 14px; padding: 48px 24px; text-align: center; cursor: pointer; background: #fafaf8; transition: border-color .15s, background .15s; }
.upload-zone:hover, .upload-zone:active { border-color: #1a1a1a; background: #f4f3ef; }
.upload-zone .icon { font-size: 40px; margin-bottom: 10px; }
.upload-zone .title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.upload-zone .sub { color: #999; font-size: 13px; }
.btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
.btn-dark { background: #1a1a1a; color: #fff; }
.btn-green { background: #1e7e34; color: #fff; }
.btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
.btn:hover { opacity: 0.88; }
.date-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #f5f4f0; border-radius: 8px; margin-bottom: 16px; }
.date-row label { font-weight: 700; font-size: 15px; min-width: 50px; }
.date-row input { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 15px; font-weight: 700; width: 130px; }
.loading { text-align: center; padding: 32px; color: #666; }
.loading .spinner { font-size: 28px; display: block; margin-bottom: 10px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { padding: 12px 16px; background: #fff0f0; border-radius: 8px; color: #c00; font-size: 14px; margin-top: 12px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.top-bar .back { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; color: #666; }
.preview-img { width: 100%; border-radius: 8px; border: 1px solid #eee; margin-bottom: 12px; }
canvas { display: none; }
.api-key-row { display: flex; gap: 8px; margin-bottom: 16px; }
.api-key-row input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
.api-key-row .save-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
.api-note { font-size: 12px; color: #888; margin-bottom: 16px; }
.step-indicator { display: flex; gap: 8px; margin-bottom: 18px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.step-dot.active { background: #1a1a1a; }

/* Confirm table */
.sec-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin: 16px 0 6px; padding-bottom: 4px; border-bottom: 2px solid #eee; }
.sec-title:first-of-type { margin-top: 0; }
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { font-size: 11px; color: #999; font-weight: 600; text-align: center; padding: 4px 2px; }
.tbl th.name-col { text-align: left; padding-left: 4px; }
.tbl td { padding: 2px; }
.tbl td.name { font-size: 12.5px; color: #444; padding-left: 4px; line-height: 1.25; }
.tbl input { width: 100%; border: 1px solid #e0e0e0; border-radius: 5px; padding: 5px 2px; font-size: 13px; text-align: center; background: #fff; -moz-appearance: textfield; }
.tbl input::-webkit-outer-spin-button, .tbl input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.tbl input.sale-col { background: #fffdf0; font-weight: 700; border-color: #ecdca0; }
.tbl tr.mismatch input.close-col { background: #fff0f0; border-color: #f0a0a0; color: #c00; font-weight: 700; }
.tbl tr.sold-row td.name { font-weight: 700; color: #1a1a1a; }
.mismatch-note { font-size: 10px; color: #c00; padding-left: 4px; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: #777; margin-bottom: 12px; }
.legend span { display: flex; align-items: center; gap: 4px; }
.legend .box { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.summary-badge { display: inline-block; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 700; margin-left: 6px; }
.fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.fin-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #fafafa; border-radius: 6px; border: 1px solid #f0f0f0; }
.fin-row label { font-size: 12.5px; color: #555; flex: 1; }
.fin-row input { width: 80px; border: 1px solid #ddd; border-radius: 5px; padding: 5px 6px; font-size: 13px; text-align: right; background: #fff; }
@media (max-width: 600px) {
  .fin-grid { grid-template-columns: 1fr; }
  .tbl td.name, .tbl td.name * { font-size: 12px; }
}
</style>
</head>

// total = test + sale  (this is what JPEG/Form use)
function rowTotal(r) {
  if (!r) return 0;
  return (Number(r.test)||0) + (Number(r.sale)||0);
}
// expected close = open + refill - test - sale
function expectedClose(r) {
  return (Number(r.open)||0) + (Number(r.refill)||0) - (Number(r.test)||0) - (Number(r.sale)||0);
}
function isMismatch(r) {
  if (!r) return false;
  const anyVal = ["open","refill","test","sale","close"].some(k => Number(r[k])>0);
  if (!anyVal) return false;
  return expectedClose(r) !== (Number(r.close)||0);
}

  <div class="fin-row" style="margin-bottom:6px;background:#f5f4f0;border-color:#e4e2dc">
    <label style="font-weight:700">เงินทอนเปิดร้าน (กรอกเอง)</label>
    <input type="number" value="${state.openCash}" oninput="state.openCash=Number(this.value)||0">
  </div>
  <div class="fin-grid">`;
  FINANCE_ITEMS.forEach(key => {
    const v = state.finance[key] || 0;
    html += `<div class="fin-row"><label>${key}</label>
      <input type="number" value="${v}" oninput="state.finance['${escKey(key)}']=Number(this.value)||0"></div>`;
  });
  html += `</div>`;

  html += `<button class="btn btn-dark" style="margin-top:18px" onclick="handleConfirm()">✅ ยืนยัน → สร้าง JPEG + Form URL</button>
  </div>`;
  return html;
}

function renderDone() {
  return `<div>
    <div class="card">
      ${stepDots("done")}
      <div style="font-weight:700;font-size:16px;margin-bottom:12px">🖼️ JPEG Summary <span class="summary-badge">รวม Test+ขาย</span></div>
      <img class="preview-img" src="${state.jpegUrl}" alt="summary">
      <a class="btn btn-dark" href="${state.jpegUrl}" download="sales_${(state.date||'today').replace(/\//g,'-')}.jpg">⬇️ ดาวน์โหลด JPEG</a>
    </div>
    <div class="card">
      <div style="font-weight:700;font-size:16px;margin-bottom:12px">📋 Google Form</div>
      <a class="btn btn-green" href="${state.formUrl}" target="_blank" rel="noreferrer">🔗 เปิด Form (กรอกครบแล้ว) →</a>
    </div>
    <button class="btn btn-outline" onclick="resetApp()">+ อัปโหลดวันถัดไป</button>
  </div>`;
}

function escKey(k){ return k.replace(/'/g,"\\'"); }

// ============================================================
// EVENTS
// ============================================================
function saveApiKey() {
  const key = document.getElementById("apiKeyInput")?.value?.trim();
  if (key) { localStorage.setItem("anthropic_key", key); setState({ apiKey: key, step: "upload" }); }
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const mime = file.type || "image/jpeg";
  const b64 = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.readAsDataURL(file); });
  setState({ step: "loading", error: "" });
  await parseImage(b64, mime);
}

async function parseImage(b64, mime) {
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": state.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-opus-4-5",
        max_tokens: 8000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: mime, data: b64 } },
            { type: "text", text: PROMPT }
          ]
        }]
      })
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error.message);
    const text = json.content?.find(c => c.type === "text")?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    // build rows
    const rows = {};
    Object.keys(ENTRY_MAP).forEach(k => {
      if (k === "วันที่" || FINANCE_ITEMS.includes(k)) return;
      const src = (parsed.items && parsed.items[k]) || {};
      rows[k] = {
        open: Number(src.open)||0, refill: Number(src.refill)||0,
        test: Number(src.test)||0, sale: Number(src.sale)||0, close: Number(src.close)||0
      };
    });
    const finance = {};
    FINANCE_ITEMS.forEach(k => finance[k] = Number((parsed.finance && parsed.finance[k]))||0);

    setState({ date: parsed.date || "", rows, finance, step: "confirm" });
  } catch (err) {
    setState({ step: "upload", error: "อ่านรูปไม่สำเร็จ: " + err.message });
  }
}

function updateCell(key, field, val) {
  if (!state.rows[key]) state.rows[key] = {open:0,refill:0,test:0,sale:0,close:0};
  state.rows[key][field] = Number(val)||0;
  const r = state.rows[key];
  // update total cell
  const totCell = document.querySelector(`[data-tot="${key}"]`);
  const tot = rowTotal(r);
  if (totCell) { totCell.textContent = tot||'-'; totCell.style.color = tot>0?'#166534':'#ccc'; }
  // update mismatch highlight
  const tr = document.querySelector(`tr[data-key="${key}"]`);
  if (tr) {
    tr.className = (isMismatch(r)?'mismatch ':'') + (tot>0?'sold-row':'');
  }
}

function handleConfirm() {
  const dateEl = document.getElementById("dateInput");
  if (dateEl) state.date = dateEl.value;
  const url = buildFormUrl();
  const jpeg = drawJpeg();
  setState({ formUrl: url, jpegUrl: jpeg, step: "done" });
}

function resetApp() {
  setState({ step: "upload", date:"", rows:{}, finance:{}, formUrl:"", jpegUrl:"", error:"" });
}

// ============================================================
// FORM URL  (uses test+sale total, finance as-is)
// ============================================================
function buildFormUrl() {
  const params = [`entry.37045481=${encodeURIComponent(state.date||"")}`];
  Object.entries(ENTRY_MAP).forEach(([label, entryId]) => {
    if (label === "วันที่") return;
    let val;
    if (FINANCE_ITEMS.includes(label)) val = state.finance[label]||0;
    else val = rowTotal(state.rows[label]);
    params.push(`${entryId}=${encodeURIComponent(val)}`);
  });
  return FORM_BASE + "&" + params.join("&");
}

// ============================================================
// JPEG  (shows total = test+sale per item)
// ============================================================
function drawJpeg() {
  const data = {};
  Object.keys(state.rows).forEach(k => data[k] = rowTotal(state.rows[k]));
  data["ปิดรอบเงินสด"] = state.finance["ปิดรอบเงินสด"]||0;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 1080; canvas.height = 1080;
  const white="#ffffff", border="#e0e0e0", secBg="#f0f0eb";
  const textDark="#111", textMid="#333", textLight="#aaa", textNone="#ccc";

  ctx.fillStyle=secBg; ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle=white; ctx.fillRect(0,0,1080,72);
  ctx.strokeStyle=border; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,72); ctx.lineTo(1080,72); ctx.stroke();
  ctx.fillStyle=textLight; ctx.font="bold 11px sans-serif"; ctx.fillText("สรุปยอดขาย",36,26);
  ctx.fillStyle=textDark; ctx.font="bold 32px sans-serif"; ctx.fillText(state.date||"",36,58);
  ctx.fillStyle=textLight; ctx.font="13px sans-serif";
  const sub="Test + ขาย"; ctx.fillText(sub,1080-36-ctx.measureText(sub).width,58);

  ctx.fillStyle=white; ctx.fillRect(0,1020,1080,60);
  ctx.strokeStyle=border; ctx.beginPath(); ctx.moveTo(0,1020); ctx.lineTo(1080,1020); ctx.stroke();
  ctx.fillStyle=textLight; ctx.font="12px sans-serif"; ctx.fillText("ปิดรอบเงินสด",36,1042);
  ctx.fillStyle=textDark; ctx.font="bold 18px sans-serif";
  ctx.fillText(Number(data["ปิดรอบเงินสด"]||0).toLocaleString()+" บาท",36,1062);

  const colW=360, bodyH=948;
  const cols=[COL1,COL2,COL3];
  const secLabels=[["กลุ่มที่ 1",17,"อื่นๆ"],["Bon Bon",15,"Almond เคลือบช็อก"],["อื่นๆ 2",22,"กลุ่มที่ 4"]];

  cols.forEach((items,ci)=>{
    const x=ci*colW;
    ctx.fillStyle=white; ctx.fillRect(x,72,colW,bodyH);
    if(ci>0){ctx.strokeStyle="#e8e8e8";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,72);ctx.lineTo(x,1020);ctx.stroke();}
    const rowH=bodyH/(items.length+2);
    let ri=0;
    const drawSec=(label)=>{const y=72+ri*rowH;ctx.fillStyle=secBg;ctx.fillRect(x,y,colW,rowH*0.85);ctx.fillStyle="#999";ctx.font="bold 11px sans-serif";ctx.fillText(label.toUpperCase(),x+18,y+rowH*0.6);ri++;};
    const drawRow=(label,key)=>{const y=72+ri*rowH;const val=data[key];const hasVal=val&&Number(val)>0;
      ctx.fillStyle=ri%2===0?"#fafafa":white;ctx.fillRect(x,y,colW,rowH);
      ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y+rowH);ctx.lineTo(x+colW,y+rowH);ctx.stroke();
      ctx.fillStyle=textMid;ctx.font="25px sans-serif";ctx.fillText(label,x+18,y+rowH*0.68);
      const vStr=hasVal?String(val):"-";ctx.fillStyle=hasVal?textDark:textNone;ctx.font=hasVal?"bold 27px sans-serif":"25px sans-serif";
      ctx.fillText(vStr,x+colW-18-ctx.measureText(vStr).width,y+rowH*0.68);ri++;};
    const [s1,n1,s2]=secLabels[ci];
    drawSec(s1); items.slice(0,n1).forEach(([l,k])=>drawRow(l,k));
    drawSec(s2); items.slice(n1).forEach(([l,k])=>drawRow(l,k));
  });
  return canvas.toDataURL("image/jpeg",0.94);
}
