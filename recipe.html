<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>32BarX — Recipe Cost Manager</title>
<style>
:root {
  --brown-dark: #2C1A0E;
  --brown-mid:  #5C3317;
  --brown-warm: #8B4513;
  --cocoa:      #C17A3A;
  --choc-dark:  #3D1F0D;
  --choc-mid:   #6B3520;
  --choc-light: #F5EDE4;
  --cream:      #F9F4EE;
  --cream-dark: #EDE5D8;
  --white:      #FFFFFF;
  --text-main:  #1E1008;
  --text-muted: #7A6050;
  --text-light: #B0957A;
  --border:     rgba(92,51,23,0.15);
  --border-mid: rgba(92,51,23,0.25);
  --green:      #2E7D32;
  --green-bg:   #E8F5E9;
  --red:        #C62828;
  --red-bg:     #FFEBEE;
  --shadow:     0 2px 12px rgba(44,26,14,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', -apple-system, sans-serif; background: var(--cream); color: var(--text-main); min-height: 100vh; }

/* NAV */
header { background: var(--brown-dark); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 18px; font-weight: 700; color: var(--cocoa); letter-spacing: 0.04em; }
.logo span { color: var(--cream); font-weight: 300; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { padding: 6px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; color: var(--cream-dark); border: none; background: transparent; transition: background 0.15s, color 0.15s; }
.nav-tab.active, .nav-tab:hover { background: rgba(193,122,58,0.2); color: var(--cocoa); }
.nav-tab.active { font-weight: 600; }

main { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.panel { display: none; }
.panel.active { display: block; }

/* LIBRARY HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-size: 20px; font-weight: 700; color: var(--brown-dark); }
.btn-primary { background: var(--brown-mid); color: var(--white); border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.btn-primary:hover { background: var(--brown-warm); }

/* SEARCH + FILTER ROW */
.filter-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
.search-box { flex: 1; padding: 10px 14px; border: 1px solid var(--border-mid); border-radius: 8px; font-size: 15px; outline: none; background: var(--white); min-width: 0; }
.search-box:focus { border-color: var(--cocoa); }

/* CATEGORY FILTER CHIPS */
.filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; align-items: center; }
.filter-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border-mid); background: var(--white);
  color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--cocoa); color: var(--cocoa); }
.filter-chip.active {
  background: var(--brown-mid); border-color: var(--brown-mid);
  color: var(--white);
}
.filter-chip-count {
  display: inline-block; background: rgba(255,255,255,0.25);
  border-radius: 10px; padding: 0 6px; font-size: 11px; margin-left: 4px;
}
.filter-chip:not(.active) .filter-chip-count {
  background: var(--cream-dark); color: var(--text-muted);
}

/* RECIPE GRID */
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.recipe-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
.recipe-card:hover { box-shadow: var(--shadow); border-color: var(--border-mid); }
.recipe-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
.recipe-card-name { font-size: 16px; font-weight: 700; color: var(--brown-dark); }
.cat-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: var(--cream-dark); color: var(--text-muted); white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
.recipe-card-date { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.recipe-card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-box { background: var(--cream); border-radius: 8px; padding: 8px; text-align: center; }
.stat-label { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 14px; font-weight: 700; color: var(--brown-mid); }
.stat-value.green { color: var(--green); }
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 1rem; }
.empty-text { font-size: 16px; font-weight: 600; margin-bottom: 0.5rem; }
.empty-sub  { font-size: 14px; }

/* compact card */
.recipe-card-meta { font-size: 12px; color: var(--text-light); margin: 3px 0 10px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
.recipe-card-date-right { color: var(--text-light); }
.recipe-card-cost-row { display: flex; align-items: center; justify-content: space-between; }
.card-cost-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.card-cost-value { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.card-cost { font-size: 18px; font-weight: 700; color: var(--brown-mid); }
.card-cost.up   { color: var(--red); }
.card-cost.down { color: var(--green); }
.card-cost-old  { font-size: 12px; color: var(--text-light); text-decoration: line-through; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(44,26,14,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 660px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(44,26,14,0.25); }
.modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); border-radius: 16px 16px 0 0; z-index: 1; }
.modal-title-wrap { display: flex; align-items: center; gap: 10px; }
.modal-title { font-size: 18px; font-weight: 700; color: var(--brown-dark); }
.modal-cat-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: var(--cream-dark); color: var(--text-muted); }
.modal-body  { padding: 1.5rem; }
.btn-close { background: none; border: 1px solid var(--border-mid); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.btn-close:hover { background: var(--cream); }

.detail-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.detail-stat { background: var(--cream); border-radius: 10px; padding: 12px; text-align: center; }
.detail-stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.detail-stat .value { font-size: 22px; font-weight: 700; color: var(--brown-mid); }
.detail-stat .value.green { color: var(--green); }

.modal-section-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 1rem 0 6px; }
.ingredient-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.ingredient-table th { background: var(--cream-dark); padding: 8px 10px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.ingredient-table th:nth-child(2), .ingredient-table th:nth-child(3), .ingredient-table th:nth-child(4),
.ingredient-table td:nth-child(2), .ingredient-table td:nth-child(3), .ingredient-table td:nth-child(4) { text-align: right; }
.ingredient-table td { padding: 10px; border-bottom: 1px solid var(--border); }
.ingredient-table tr:last-child td { border-bottom: none; }
.ingredient-table tfoot td { font-weight: 700; color: var(--brown-mid); border-top: 2px solid var(--border-mid); padding-top: 12px; }
.choc-header-band { background: var(--choc-dark); border-radius: 6px 6px 0 0; padding: 6px 10px; font-size: 11px; font-weight: 700; color: var(--cocoa); text-transform: uppercase; letter-spacing: 0.06em; }
.choc-table-wrap { border: 1px solid rgba(61,31,13,0.2); border-radius: 0 0 6px 6px; margin-bottom: 1rem; overflow: hidden; }

.modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
.btn-secondary { flex: 1; padding: 10px; border: 1px solid var(--border-mid); background: var(--white); border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--text-muted); transition: background 0.15s; }
.btn-secondary:hover { background: var(--cream); }
.btn-danger { padding: 10px 20px; background: var(--red-bg); border: 1px solid rgba(198,40,40,0.2); color: var(--red); border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
.btn-danger:hover { background: #FFCDD2; }

/* FORM */
.form-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
.choc-card { background: var(--choc-light); border: 1.5px solid rgba(61,31,13,0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
.choc-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.choc-card-title { font-size: 15px; font-weight: 700; color: var(--choc-dark); display: flex; align-items: center; gap: 8px; }
.choc-badge { background: var(--choc-dark); color: var(--cocoa); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
.form-group { margin-bottom: 1rem; }
.form-group:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }

input[type=text], input[type=number], select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border-mid); border-radius: 8px;
  font-size: 15px; color: var(--text-main); background: var(--white); outline: none; transition: border-color 0.15s;
}
input:focus, select:focus { border-color: var(--cocoa); }
input.error, select.error { border-color: var(--red); }

/* category selector combo */
.cat-combo { position: relative; }
.cat-combo select { border-radius: 8px 8px 0 0; border-bottom-color: transparent; }
.cat-combo input { border-radius: 0 0 8px 8px; border-top: none; font-size: 14px; }
.cat-combo input::placeholder { color: var(--text-light); font-style: italic; }
.cat-new-label { font-size: 11px; color: var(--text-light); margin: 3px 0 0 2px; }

/* ingredient/choc rows — 2-row layout */
.choc-row, .ing-row {
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
/* row 1: full-width name search */
.item-row-name { position: relative; margin-bottom: 8px; }
.item-row-name input[type=text] {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border-mid);
  border-radius: 7px; font-size: 15px; background: var(--white); outline: none;
}
.item-row-name input[type=text]:focus { border-color: var(--cocoa); }
.choc-row .item-row-name input[type=text]:focus { border-color: var(--choc-mid); }
/* searchable dropdown */
.search-dropdown {
  position: absolute; top: calc(100% + 3px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--border-mid);
  border-radius: 8px; max-height: 220px; overflow-y: auto; z-index: 50;
  box-shadow: 0 4px 16px rgba(44,26,14,0.12);
}
.search-dropdown-item {
  padding: 10px 12px; font-size: 14px; cursor: pointer;
  border-bottom: 1px solid var(--border); color: var(--text-main);
  display: flex; justify-content: space-between; align-items: center;
}
.search-dropdown-item:last-child { border-bottom: none; }
.search-dropdown-item:hover { background: var(--cream); }
.search-dropdown-item.selected { background: var(--cream-dark); font-weight: 600; }
.search-dropdown-item .item-cat { font-size: 11px; color: var(--text-light); }
.search-dropdown-item .item-no-price { font-size: 11px; color: var(--red); }
.search-dropdown-empty { padding: 12px; font-size: 14px; color: var(--text-light); text-align: center; }
/* row 2: grams + cost + remove */
.item-row-bottom { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
.item-row-bottom input[type=number] {
  padding: 8px 10px; border: 1px solid var(--border-mid); border-radius: 7px;
  font-size: 14px; background: var(--white); outline: none; width: 100%;
}
.item-row-bottom input[type=number]:focus { border-color: var(--cocoa); }
.cost-preview {
  padding: 8px 10px; background: var(--white); border-radius: 7px;
  font-size: 14px; font-weight: 700; color: var(--brown-mid);
  text-align: right; border: 1px solid var(--border);
}
.cost-preview.choc-preview { color: var(--choc-mid); border-color: rgba(61,31,13,0.2); }
.btn-remove {
  width: 34px; height: 34px; border: 1px solid rgba(198,40,40,0.25);
  background: var(--red-bg); color: var(--red); border-radius: 7px;
  cursor: pointer; font-size: 18px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}
.btn-remove:hover { background: #FFCDD2; }
.btn-add { display: flex; align-items: center; gap: 6px; padding: 10px 16px; border: 1.5px dashed var(--border-mid); background: transparent; border-radius: 8px; font-size: 14px; color: var(--text-muted); cursor: pointer; width: 100%; justify-content: center; margin-top: 4px; transition: border-color 0.15s, color 0.15s; }
.btn-add:hover { border-color: var(--cocoa); color: var(--cocoa); }
.btn-add.choc-add { border-color: rgba(61,31,13,0.25); color: var(--choc-mid); }
.btn-add.choc-add:hover { border-color: var(--choc-mid); color: var(--choc-dark); }

/* cost summary */
.cost-summary { background: var(--brown-dark); border-radius: 12px; padding: 1.25rem 1.5rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
.cs-item .cs-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.cs-item .cs-value { font-size: 20px; font-weight: 700; color: var(--cocoa); }
.cs-item .cs-value.white { color: var(--white); }
.cs-item .cs-value.choc-color { color: #D4956A; }

.form-actions { display: flex; gap: 12px; justify-content: flex-end; }
.btn-save { background: var(--brown-mid); color: var(--white); border: none; padding: 12px 32px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btn-save:hover { background: var(--brown-warm); }
.btn-save:disabled { background: var(--text-light); cursor: default; }
.btn-reset { background: none; border: 1px solid var(--border-mid); color: var(--text-muted); padding: 12px 20px; border-radius: 8px; font-size: 15px; cursor: pointer; }

/* TOAST */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brown-dark); color: var(--white); padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 999; transition: transform 0.3s ease; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

.loading-wrap { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--text-muted); gap: 10px; font-size: 15px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border-mid); border-top-color: var(--cocoa); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.margin-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.margin-good { background: var(--green-bg); color: var(--green); }
.margin-warn { background: #FFF8E1; color: #F57F17; }
.margin-bad  { background: var(--red-bg); color: var(--red); }

/* price-change indicators */
.price-changed-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700;
  background: #FFF3E0; color: #E65100;
  border: 1px solid rgba(230,81,0,0.2);
}
.price-up   { background: #FFEBEE; color: var(--red);   border-color: rgba(198,40,40,0.2); }
.price-down { background: var(--green-bg); color: var(--green); border-color: rgba(46,125,50,0.2); }
.price-missing { background: #F3E5F5; color: #6A1B9A; border-color: rgba(106,27,154,0.2); }

.cost-compare {
  display: flex; flex-direction: column; gap: 1px;
}
.cost-old { font-size: 11px; color: var(--text-light); text-decoration: line-through; }
.cost-new { font-size: 14px; font-weight: 700; }
.cost-new.up   { color: var(--red); }
.cost-new.down { color: var(--green); }
.cost-new.same { color: var(--brown-mid); }

/* table cell price diff */
.td-cost-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.td-cost-current { font-weight: 700; font-size: 14px; }
.td-cost-current.up   { color: var(--red); }
.td-cost-current.down { color: var(--green); }
.td-cost-saved { font-size: 11px; color: var(--text-light); text-decoration: line-through; }
.td-missing { font-size: 12px; color: #6A1B9A; font-style: italic; }

/* modal price-change summary banner */
.price-change-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: #FFF8E1; border: 1px solid rgba(230,81,0,0.25);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem;
  font-size: 13px;
}
.price-change-banner.up   { background: #FFEBEE; border-color: rgba(198,40,40,0.25); }
.price-change-banner.down { background: var(--green-bg); border-color: rgba(46,125,50,0.25); }
.banner-label { color: var(--text-muted); }
.banner-diff  { font-weight: 700; }
.banner-diff.up   { color: var(--red); }
.banner-diff.down { color: var(--green); }

@media (max-width: 600px) {
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .choc-row, .ing-row { grid-template-columns: 1fr 1fr; }
  .choc-row .cost-preview, .ing-row .cost-preview { grid-column: span 2; }
  .cost-summary { grid-template-columns: 1fr 1fr; }
  .detail-stats { grid-template-columns: 1fr 1fr; }
  .recipe-card-stats { grid-template-columns: 1fr 1fr; }
  .filter-row { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<header>
  <div class="logo">32Bar<span>X</span> &nbsp;Recipe <span style="font-size:11px;font-weight:400;color:var(--text-light);letter-spacing:0.02em">v1.1</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="mode-badge" style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.1);color:var(--text-light)">Guest</span>
    <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('library')">คลังสูตร</button>
    <button class="nav-tab" onclick="showPanel('new')">+ สูตรใหม่</button>
  </div>
  </div>
</header>

<main>

<!-- ══ LIBRARY ══ -->
<div id="panel-library" class="panel active">
  <div class="section-header">
    <div class="section-title">คลังสูตรช็อกโกแลต</div>
    <button class="btn-primary" onclick="showPanel('new')">+ สร้างสูตรใหม่</button>
  </div>

  <div class="filter-row">
    <input class="search-box" type="text" placeholder="ค้นหาชื่อสูตร…" id="search-input" oninput="applyFilters()">
  </div>

  <div class="filter-chips" id="category-chips">
    <!-- chips rendered by JS -->
  </div>

  <div id="recipe-list"><div class="loading-wrap"><div class="spinner"></div> กำลังโหลด…</div></div>
</div>

<!-- ══ NEW RECIPE ══ -->
<div id="panel-new" class="panel">
  <div class="section-header">
    <div class="section-title" id="form-title">สร้างสูตรใหม่</div>
  </div>

  <!-- basic info -->
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>ชื่อสูตร <span style="color:var(--red)">*</span></label>
        <input type="text" id="recipe-name" placeholder="เช่น Dark 72% Surat">
      </div>
      <div class="form-group">
        <label>หมวดหมู่ <span style="color:var(--red)">*</span></label>
        <div class="cat-combo">
          <select id="recipe-cat-select" onchange="catSelectChanged()">
            <option value="">— เลือกหมวดหมู่ —</option>
            <!-- options injected by JS -->
            <option value="__new__">+ เพิ่มหมวดหมู่ใหม่…</option>
          </select>
          <input type="text" id="recipe-cat-new" placeholder="พิมพ์ชื่อหมวดหมู่ใหม่" style="display:none">

<div id="passcode-overlay" style="display:none;position:fixed;inset:0;background:rgba(44,26,14,0.85);z-index:300;align-items:center;justify-content:center;padding:1rem">
  <div style="background:var(--white);border-radius:16px;width:100%;max-width:360px;padding:2rem;text-align:center;box-shadow:0 8px 40px rgba(44,26,14,0.3)">
    <div style="font-size:32px;margin-bottom:0.75rem">🍫</div>
    <div style="font-size:18px;font-weight:700;color:var(--brown-dark);margin-bottom:4px">32BarX Recipe</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:1.5rem">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</div>
    <input type="password" id="passcode-input" placeholder="รหัสผ่าน"
      style="width:100%;padding:12px;border:1px solid var(--border-mid);border-radius:8px;font-size:18px;text-align:center;letter-spacing:0.2em;outline:none;margin-bottom:8px"
      onkeydown="if(event.key==='Enter')submitPasscode()">
    <div id="passcode-error" style="display:none;font-size:12px;color:var(--red);margin-bottom:8px"></div>
    <button onclick="submitPasscode()" style="width:100%;padding:12px;background:var(--brown-mid);color:var(--white);border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px">เข้าสู่ระบบ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3h26ZhFKrsa1Q_1VOta3lel1t-cEUrzx5zxtC9IWQOQTdQnOYo13aK9WfVeMOWVQhhg/exec';
const DELETE_PASSWORD  = '150';
const GUEST_CODE       = '32';
const FULL_ACCESS_CODE = '831';

let isFullMode = false;

let ingredients   = [];
let chocolates    = [];
let recipes       = [];
let allCategories = [];   // unique categories from saved recipes
let activeFilter  = null; // null = all
let editingId     = null;
let currentRecipe = null;
let rowCount      = 0;

// ── INIT ──────────────────────────────────────
(async function init() {
  showPasscodeGate();
})();

function showPasscodeGate() {
  document.getElementById('passcode-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('passcode-input').focus(), 100);
}

function submitPasscode() {
  const val = document.getElementById('passcode-input').value.trim();
  if (val === FULL_ACCESS_CODE) {
    isFullMode = true;
    document.getElementById('passcode-error').style.display = 'none';
    closePasscodeGate();
  } else if (val === GUEST_CODE) {
    isFullMode = false;
    document.getElementById('passcode-error').style.display = 'none';
    closePasscodeGate();
  } else {
    const errEl = document.getElementById('passcode-error');
    errEl.textContent = val === '' ? 'กรุณาใส่รหัสผ่าน' : 'รหัสผ่านไม่ถูกต้อง';
    errEl.style.display = 'block';
    document.getElementById('passcode-input').value = '';
    document.getElementById('passcode-input').focus();
  }
}

function skipPasscode() { /* disabled */ }

function closePasscodeGate() {
  document.getElementById('passcode-overlay').style.display = 'none';
  // update mode badge in header
  const badge = document.getElementById('mode-badge');
  if (isFullMode) {
    badge.textContent = 'Full Access';
    badge.style.background = 'rgba(193,122,58,0.25)';
    badge.style.color = 'var(--cocoa)';
  } else {
    badge.textContent = 'Guest';
    badge.style.background = 'rgba(255,255,255,0.1)';
    badge.style.color = 'var(--text-light)';
  }
  startApp();
}

async function startApp() {
  await Promise.all([loadAllData(), loadRecipes()]);
}

// ── PANELS ────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab')[name === 'library' ? 0 : 1].classList.add('active');
  if (name === 'new' && !editingId &&
      !document.getElementById('choc-rows').children.length &&
      !document.getElementById('ing-rows').children.length) {
    addChocRow(); addIngRow();
  }
}

// ── LOAD DATA ─────────────────────────────────
async function loadAllData() {
  try {
    const res  = await fetch(GAS_URL + '?mode=all');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    ingredients = data.ingredients;
    chocolates  = data.chocolates;
    document.getElementById('ing-load-status').textContent  = ingredients.length + ' รายการ';
    document.getElementById('choc-load-status').textContent = chocolates.length  + ' ชนิด';
    refreshChocSelects();
    refreshIngSelects();
  } catch(e) {
    document.getElementById('ing-load-status').textContent  = '⚠ โหลดไม่ได้';
    document.getElementById('choc-load-status').textContent = '⚠ โหลดไม่ได้';
    showToast('โหลดข้อมูลไม่สำเร็จ: ' + e.message, 'error');
  }
}

async function loadRecipes() {
  const el = document.getElementById('recipe-list');
  try {
    const res  = await fetch(GAS_URL + '?mode=recipes');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    recipes = data.recipes;
    // derive unique categories (preserve insertion order)
    const seen = {};
    allCategories = [];
    recipes.forEach(r => {
      const c = (r.category || '').trim();
      if (c && !seen[c]) { seen[c] = true; allCategories.push(c); }
    });
    allCategories.sort();
    renderCategoryChips();
    refreshCatSelectOptions();
    applyFilters();
  } catch(e) {
    el.innerHTML = '<div class="loading-wrap" style="color:var(--red)">⚠ โหลดสูตรไม่สำเร็จ: ' + e.message + '</div>';
  }
}

// ── CATEGORY CHIPS ────────────────────────────
function renderCategoryChips() {
  const el = document.getElementById('category-chips');
  // count per category
  const counts = {};
  recipes.forEach(r => {
    const c = (r.category || '').trim() || 'ไม่มีหมวดหมู่';
    counts[c] = (counts[c] || 0) + 1;
  });

  let html = `<button class="filter-chip ${activeFilter === null ? 'active' : ''}" onclick="setFilter(null)">
    ทั้งหมด <span class="filter-chip-count">${recipes.length}</span>
  </button>`;

  allCategories.forEach(cat => {
    const cnt = counts[cat] || 0;
    const active = activeFilter === cat ? 'active' : '';
    html += `<button class="filter-chip ${active}" onclick="setFilter('${esc(cat)}')">
      ${esc(cat)} <span class="filter-chip-count">${cnt}</span>
    </button>`;
  });

  el.innerHTML = html;
}

function setFilter(cat) {
  activeFilter = cat;
  renderCategoryChips();
  applyFilters();
}

// ── FILTER ─────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  let list = recipes;
  if (activeFilter !== null) list = list.filter(r => (r.category || '').trim() === activeFilter);
  if (q) list = list.filter(r => r.name.toLowerCase().includes(q));
  renderRecipes(list);
}

// ── PRICE COMPARISON HELPERS ──────────────────
// Build lookup maps from current price data
function buildPriceMaps() {
  const chocMap = {};
  chocolates.forEach(c => { chocMap[c.name] = c; });
  const ingMap = {};
  ingredients.forEach(i => { ingMap[i.name] = i; });
  return { chocMap, ingMap };
}

// Compute current total cost of a recipe using live prices.
// Returns { currentTotal, savedTotal, items, status }
// status: 'same' | 'up' | 'down' | 'missing'
function computeCurrentCost(r) {
  const { chocMap, ingMap } = buildPriceMaps();
  let currentTotal = 0;
  let savedTotal   = 0;
  let hasMissing   = false;
  const items = [];

  const processItems = (list, map, type) => {
    (list || []).forEach(item => {
      const saved   = item.cost || 0;
      savedTotal   += saved;
      const entry   = map[item.name];
      if (!entry || (!entry.hasPrice && type === 'choc') || (type === 'choc' && entry.costPerGram === null)) {
        hasMissing = true;
        items.push({ name: item.name, grams: item.grams, savedCpg: item.costPerGram, currentCpg: null, savedCost: saved, currentCost: null, type, missing: true });
      } else {
        const cpg     = type === 'choc' ? entry.costPerGram : entry.costPerGram;
        const current = cpg !== null ? cpg * item.grams : null;
        if (current !== null) currentTotal += current;
        else hasMissing = true;
        items.push({ name: item.name, grams: item.grams, savedCpg: item.costPerGram, currentCpg: cpg, savedCost: saved, currentCost: current, type, missing: current === null });
      }
    });
  };

  processItems(r.chocolates,  chocMap, 'choc');
  processItems(r.ingredients, ingMap,  'ing');

  const THRESHOLD = 0.005; // ignore sub-0.5% float noise
  let status = 'same';
  if (hasMissing) {
    status = 'missing';
  } else {
    const diff = currentTotal - savedTotal;
    if (Math.abs(diff) / (savedTotal || 1) > THRESHOLD) {
      status = diff > 0 ? 'up' : 'down';
    }
  }

  return { currentTotal, savedTotal, items, status };
}

// ── RENDER LIBRARY ────────────────────────────
function renderRecipes(list) {
  const el = document.getElementById('recipe-list');
  if (!list || list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>
      <div class="empty-text">${activeFilter ? 'ไม่มีสูตรในหมวด "' + esc(activeFilter) + '"' : 'ยังไม่มีสูตรในคลัง'}</div>
      <div class="empty-sub">กด "สร้างสูตรใหม่" เพื่อเริ่มต้น</div></div>`;
    return;
  }
  el.innerHTML = '<div class="recipe-grid">' + list.map(recipeCard).join('') + '</div>';
}

function recipeCard(r) {
  const chocCount = (r.chocolates || []).length;
  const cat       = (r.category || '').trim();
  const cp        = computeCurrentCost(r);

  let costDisplay;
  if (!isFullMode) {
    costDisplay = `<span class="card-cost" style="color:var(--text-light);font-size:14px">—</span>`;
  } else if (cp.status === 'same') {
    costDisplay = `<span class="card-cost">฿${cp.currentTotal.toFixed(2)}</span>`;
  } else if (cp.status === 'missing') {
    costDisplay = `<span class="card-cost">฿${r.totalCost.toFixed(2)}</span> <span class="price-changed-badge price-missing" style="font-size:10px;padding:1px 6px">⚠</span>`;
  } else {
    const arrow = cp.status === 'up' ? '▲' : '▼';
    const diff  = cp.currentTotal - r.totalCost;
    costDisplay = `<span class="card-cost ${cp.status}">฿${cp.currentTotal.toFixed(2)}</span>
      <span class="card-cost-old">฿${r.totalCost.toFixed(2)}</span>
      <span class="price-changed-badge ${cp.status}" style="font-size:10px;padding:1px 6px">${arrow}${Math.abs(diff).toFixed(2)}</span>`;
  }

  return `
    <div class="recipe-card" onclick="openRecipe('${r.id}')">
      <div class="recipe-card-top">
        <div class="recipe-card-name">${esc(r.name)}</div>
        ${cat ? `<div class="cat-badge">${esc(cat)}</div>` : ''}
      </div>
      <div class="recipe-card-meta">
        <span>🍫 ${chocCount} ชนิด · yield ${r.yield} ชิ้น</span>
        <span class="recipe-card-date-right">${r.createdAt}</span>
      </div>
      <div class="recipe-card-cost-row">
        <div class="card-cost-label">ต้นทุนรวม</div>
        <div class="card-cost-value">${costDisplay}</div>
      </div>
    </div>`;
}

// ── CATEGORY SELECT IN FORM ───────────────────
function refreshCatSelectOptions() {
  const sel = document.getElementById('recipe-cat-select');
  const cur = sel.value;
  // remove old options except blank + __new__
  while (sel.options.length > 1) sel.remove(1);
  // insert categories before __new__
  const newOpt = document.createElement('option');
  newOpt.value = '__new__'; newOpt.textContent = '+ เพิ่มหมวดหมู่ใหม่…';
  allCategories.forEach(cat => {
    const o = document.createElement('option');
    o.value = cat; o.textContent = cat;
    sel.appendChild(o);
  });
  sel.appendChild(newOpt);
  // restore
  if (cur) for (const o of sel.options) if (o.value === cur) { o.selected = true; break; }
}

function catSelectChanged() {
  const sel     = document.getElementById('recipe-cat-select');
  const newInp  = document.getElementById('recipe-cat-new');
  const hint    = document.getElementById('cat-new-hint');
  if (sel.value === '__new__') {
    newInp.style.display = 'block';
    hint.style.display   = 'block';
    newInp.focus();
  } else {
    newInp.style.display = 'none';
    hint.style.display   = 'none';
    newInp.value = '';
  }
  // clear error state
  sel.classList.remove('error');
}

function getSelectedCategory() {
  const sel = document.getElementById('recipe-cat-select');
  if (sel.value === '__new__') {
    return document.getElementById('recipe-cat-new').value.trim();
  }
  return sel.value;
}

function setFormCategory(cat) {
  const sel    = document.getElementById('recipe-cat-select');
  const newInp = document.getElementById('recipe-cat-new');
  const hint   = document.getElementById('cat-new-hint');
  // try to find in existing options
  let found = false;
  for (const o of sel.options) {
    if (o.value === cat) { o.selected = true; found = true; break; }
  }
  if (!found && cat) {
    sel.value = '__new__';
    newInp.value = cat;
    newInp.style.display = 'block';
    hint.style.display   = 'block';
  } else {
    newInp.style.display = 'none';
    hint.style.display   = 'none';
    newInp.value = '';
  }
}

// ── SEARCHABLE ITEM ROW HELPERS ──────────────
function buildSearchDropdown(rowId, items, type) {
  // items: [{name, costPerGram/hasPrice, category}]
  const wrap = document.getElementById(rowId + '-dropdown');
  const q    = (document.getElementById(rowId + '-search').value || '').toLowerCase().trim();
  const filtered = q ? items.filter(i => i.name.toLowerCase().includes(q)) : items;

  if (!filtered.length) {
    wrap.innerHTML = '<div class="search-dropdown-empty">ไม่พบรายการ</div>';
    return;
  }
  const curVal = document.getElementById(rowId + '-val').value;
  wrap.innerHTML = filtered.map(i => {
    const isChoc   = type === 'choc';
    const noPrice  = isChoc ? !i.hasPrice : false;
    const rightTxt = noPrice
      ? `<span class="item-no-price">ไม่มีราคา</span>`
      : `<span class="item-cat">${esc(isChoc ? 'Chocolate' : i.category)}</span>`;
    const sel = curVal === i.name ? ' selected' : '';
    return `<div class="search-dropdown-item${sel}" data-name="${esc(i.name)}" data-cpg="${isChoc ? (i.costPerGram || '') : i.costPerGram}" data-hasprice="${isChoc ? i.hasPrice : true}" onclick="selectItem('${rowId}','${type}',this)">
      <span>${esc(i.name)}</span>${rightTxt}
    </div>`;
  }).join('');
}

function selectItem(rowId, type, el) {
  const name   = el.dataset.name;
  const cpg    = el.dataset.cpg;
  const hasp   = el.dataset.hasprice === 'true';
  document.getElementById(rowId + '-search').value = name;
  document.getElementById(rowId + '-val').value    = name;
  document.getElementById(rowId + '-cpg').value    = cpg;
  document.getElementById(rowId + '-hasp').value   = hasp ? '1' : '0';
  closeDropdown(rowId);
  if (type === 'choc') chocRowChanged(rowId);
  else                  ingRowChanged(rowId);
}

function openDropdown(rowId, items, type) {
  const wrap = document.getElementById(rowId + '-dropdown');
  wrap.style.display = 'block';
  buildSearchDropdown(rowId, items, type);
}

function closeDropdown(rowId) {
  const wrap = document.getElementById(rowId + '-dropdown');
  if (wrap) wrap.style.display = 'none';
}

function closeAllDropdowns() {
  document.querySelectorAll('.search-dropdown').forEach(d => d.style.display = 'none');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.item-row-name')) closeAllDropdowns();
});

function itemRowHtml(rowId, type, preset) {
  const isChoc = type === 'choc';
  const label  = isChoc ? 'ช็อกโกแลต' : 'วัตถุดิบ';
  const presetName = preset ? preset.name  : '';
  const presetG    = preset ? preset.grams : '';
  const presetCpg  = preset ? (preset.costPerGram || '') : '';
  const presetHasp = preset ? (preset.hasPrice !== false ? '1' : '0') : '1';
  return `
    <input type="hidden" id="${rowId}-val"  value="${esc(presetName)}">
    <input type="hidden" id="${rowId}-cpg"  value="${presetCpg}">
    <input type="hidden" id="${rowId}-hasp" value="${presetHasp}">
    <div class="item-row-name">
      <label style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:5px">${label}</label>
      <input type="text" id="${rowId}-search" value="${esc(presetName)}" placeholder="พิมพ์เพื่อค้นหา…" autocomplete="off"
        oninput="buildSearchDropdown('${rowId}',${isChoc?'chocolates':'ingredients'},'${type}')"
        onfocus="openDropdown('${rowId}',${isChoc?'chocolates':'ingredients'},'${type}')"
        onkeydown="if(event.key==='Escape')closeDropdown('${rowId}')">
      <div class="search-dropdown" id="${rowId}-dropdown" style="display:none"></div>
    </div>
    <div class="item-row-bottom">
      <div>
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:5px">ปริมาณ (g)</label>
        <input type="number" id="${rowId}-grams" value="${presetG}" min="0" step="0.1" placeholder="0"
          oninput="${isChoc?'chocRowChanged':'ingRowChanged'}('${rowId}')">
      </div>
      <div class="cost-preview ${isChoc?'choc-preview':''}" id="${rowId}-cost">${presetName ? '฿—' : '฿—'}</div>
      <button class="btn-remove" onclick="removeRow('${rowId}')" title="ลบ">−</button>
    </div>`;
}

// ── CHOCOLATE ROWS ────────────────────────────
function chocOptions() {
  return chocolates.map(c => {
    const label = c.hasPrice ? c.name : c.name + ' (ยังไม่มีราคา)';
    return `<option value="${esc(c.name)}" data-cpg="${c.hasPrice ? c.costPerGram : ''}" data-hasprice="${c.hasPrice}">${esc(label)}</option>`;
  }).join('');
}

function addChocRow(preset) {
  rowCount++;
  const id  = 'choc-' + rowCount;
  const div = document.createElement('div');
  div.className = 'choc-row'; div.id = id;
  div.innerHTML = itemRowHtml(id, 'choc', preset);
  document.getElementById('choc-rows').appendChild(div);
  if (preset) { chocRowChanged(id); }
  recalc();
}

function chocRowChanged(rowId) {
  const cpg  = parseFloat(document.getElementById(rowId + '-cpg').value);
  const hasp = document.getElementById(rowId + '-hasp').value === '1';
  const name = document.getElementById(rowId + '-val').value;
  const g    = parseFloat(document.getElementById(rowId + '-grams').value) || 0;
  const el   = document.getElementById(rowId + '-cost');
  if (!isFullMode) { el.textContent = '—'; el.style.color = 'var(--text-light)'; return; }
  if (hasp && !isNaN(cpg) && g) {
    el.textContent = '฿' + (cpg * g).toFixed(2); el.style.color = '';
  } else if (name && !hasp) {
    el.textContent = 'ไม่มีราคา'; el.style.color = 'var(--red)';
  } else {
    el.textContent = '฿—'; el.style.color = '';
  }
  recalc();
}

function refreshChocSelects() { /* searchable — no refresh needed */ }

// ── INGREDIENT ROWS ───────────────────────────
function ingOptions() {
  return ingredients.map(i =>
    `<option value="${esc(i.name)}" data-cpg="${i.costPerGram}">${esc(i.name)} (${esc(i.category)})</option>`
  ).join('');
}

function addIngRow(preset) {
  rowCount++;
  const id  = 'ing-' + rowCount;
  const div = document.createElement('div');
  div.className = 'ing-row'; div.id = id;
  div.innerHTML = itemRowHtml(id, 'ing', preset);
  document.getElementById('ing-rows').appendChild(div);
  if (preset) { ingRowChanged(id); }
  recalc();
}

function ingRowChanged(rowId) {
  const cpg = parseFloat(document.getElementById(rowId + '-cpg').value);
  const g   = parseFloat(document.getElementById(rowId + '-grams').value) || 0;
  const el  = document.getElementById(rowId + '-cost');
  if (!isFullMode) { el.textContent = '—'; el.style.color = 'var(--text-light)'; return; }
  el.textContent = (!isNaN(cpg) && g) ? '฿' + (cpg * g).toFixed(2) : '฿—';
  recalc();
}

function refreshIngSelects() { /* searchable — no refresh needed */ }

function removeRow(id) { document.getElementById(id).remove(); recalc(); }

// ── RECALC ────────────────────────────────────
function recalc() {
  let chocTotal = 0;
  document.querySelectorAll('.choc-row').forEach(row => {
    const cpg  = parseFloat(document.getElementById(row.id + '-cpg')?.value);
    const hasp = document.getElementById(row.id + '-hasp')?.value === '1';
    const g    = parseFloat(document.getElementById(row.id + '-grams')?.value) || 0;
    if (hasp && !isNaN(cpg)) chocTotal += cpg * g;
  });
  let ingTotal = 0;
  document.querySelectorAll('.ing-row').forEach(row => {
    const cpg = parseFloat(document.getElementById(row.id + '-cpg')?.value);
    const g   = parseFloat(document.getElementById(row.id + '-grams')?.value) || 0;
    if (!isNaN(cpg)) ingTotal += cpg * g;
  });
  const total   = chocTotal + ingTotal;
  const yld     = parseFloat(document.getElementById('recipe-yield').value) || 1;
  const perUnit = total / yld;
  const selling = parseFloat(document.getElementById('recipe-price').value) || 0;

  const DASH = '—';
  document.getElementById('sum-choc').textContent  = isFullMode ? '฿' + chocTotal.toFixed(2) : DASH;
  document.getElementById('sum-ing').textContent   = isFullMode ? '฿' + ingTotal.toFixed(2)  : DASH;
  document.getElementById('sum-total').textContent = isFullMode ? '฿' + total.toFixed(2)      : DASH;

  let perUnitText = isFullMode ? '฿' + perUnit.toFixed(2) : DASH;
  if (isFullMode && selling > 0) {
    const margin = (selling - perUnit) / selling * 100;
    perUnitText += ' · ' + margin.toFixed(1) + '%';
    document.getElementById('sum-per-unit').style.color = margin >= 40 ? '#6FBF73' : margin >= 20 ? '#FFB74D' : '#EF9A9A';
  } else {
    document.getElementById('sum-per-unit').style.color = '';
  }
  document.getElementById('sum-per-unit').textContent = perUnitText;
}

// ── SAVE ──────────────────────────────────────
async function saveRecipe() {
  const name = document.getElementById('recipe-name').value.trim();
  const cat  = getSelectedCategory();

  // validation
  let valid = true;
  if (!name) {
    document.getElementById('recipe-name').classList.add('error');
    valid = false;
  } else {
    document.getElementById('recipe-name').classList.remove('error');
  }
  if (!cat) {
    document.getElementById('recipe-cat-select').classList.add('error');
    showToast('กรุณาเลือกหรือพิมพ์หมวดหมู่', 'error');
    valid = false;
  } else {
    document.getElementById('recipe-cat-select').classList.remove('error');
  }
  if (!valid) return;

  const chocs = [];
  document.querySelectorAll('.choc-row').forEach(row => {
    const name = document.getElementById(row.id + '-val')?.value;
    const g    = parseFloat(document.getElementById(row.id + '-grams')?.value) || 0;
    if (!name || !g) return;
    const cpg  = parseFloat(document.getElementById(row.id + '-cpg')?.value);
    const hasp = document.getElementById(row.id + '-hasp')?.value === '1';
    chocs.push({ name, grams: g, costPerGram: hasp ? cpg : null, cost: hasp && !isNaN(cpg) ? cpg * g : 0, hasPrice: hasp });
  });

  const ings = [];
  document.querySelectorAll('.ing-row').forEach(row => {
    const name = document.getElementById(row.id + '-val')?.value;
    const g    = parseFloat(document.getElementById(row.id + '-grams')?.value) || 0;
    if (!name || !g) return;
    const cpg  = parseFloat(document.getElementById(row.id + '-cpg')?.value) || 0;
    ings.push({ name, grams: g, costPerGram: cpg, cost: cpg * g });
  });

  if (!chocs.length && !ings.length) { showToast('กรุณาเพิ่มวัตถุดิบอย่างน้อย 1 รายการ', 'error'); return; }

  const yld       = parseFloat(document.getElementById('recipe-yield').value) || 1;
  const selling   = parseFloat(document.getElementById('recipe-price').value) || 0;
  const chocCost  = chocs.reduce((s, c) => s + c.cost, 0);
  const ingCost   = ings.reduce((s, i) => s + i.cost, 0);
  const totalCost = chocCost + ingCost;

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก…';

  try {
    const mode    = editingId ? 'updateRecipe' : 'saveRecipe';
    const payload = { mode, name, category: cat, yield: yld, chocolates: chocs, ingredients: ings, totalCost, costPerUnit: totalCost / yld, sellingPrice: selling };
    if (editingId) payload.id = editingId;

    const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // add to allCategories if new
    if (cat && !allCategories.includes(cat)) {
      allCategories.push(cat);
      allCategories.sort();
      refreshCatSelectOptions();
    }

    showToast(editingId ? 'อัปเดตสูตรแล้ว ✓' : 'บันทึกสูตรแล้ว ✓', 'success');
    resetForm();
    await loadRecipes();
    showPanel('library');
  } catch(e) {
    showToast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'บันทึกสูตร';
  }
}

// ── DETAIL MODAL ──────────────────────────────
function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  currentRecipe = r;

  document.getElementById('modal-recipe-name').textContent = r.name;
  const catBadge = document.getElementById('modal-cat-badge');
  catBadge.textContent = r.category || '';
  catBadge.style.display = r.category ? 'inline-block' : 'none';

  // compute current cost
  const cp  = computeCurrentCost(r);
  const yld = r.yield || 1;
  const currentPerUnit = cp.status !== 'missing' ? cp.currentTotal / yld : r.costPerUnit;

  // price change banner (full mode only)
  let bannerHtml = '';
  if (isFullMode && cp.status !== 'same') {
    const diff = cp.currentTotal - r.totalCost;
    if (cp.status === 'missing') {
      bannerHtml = `<div class="price-change-banner" style="background:#F3E5F5;border-color:rgba(106,27,154,0.25)">
        <span class="banner-label">⚠ วัตถุดิบบางรายการไม่พบในราคาปัจจุบัน — ต้นทุนที่แสดงอาจไม่ครบถ้วน</span>
      </div>`;
    } else {
      const arrow = cp.status === 'up' ? '▲' : '▼';
      const pct   = Math.abs(diff / (r.totalCost || 1) * 100).toFixed(1);
      bannerHtml = `<div class="price-change-banner ${cp.status}">
        <span class="banner-label">ราคาวัตถุดิบเปลี่ยนแปลงจากที่บันทึกไว้</span>
        <span class="banner-diff ${cp.status}">${arrow} ${diff > 0 ? '+' : ''}฿${diff.toFixed(2)} (${pct}%)</span>
      </div>`;
    }
  }

  // stats
  const displayTotal   = cp.status !== 'missing' ? cp.currentTotal   : r.totalCost;
  const displayPerUnit = cp.status !== 'missing' ? currentPerUnit    : r.costPerUnit;
  const margin = r.sellingPrice > 0 ? ((r.sellingPrice - displayPerUnit) / r.sellingPrice * 100) : null;
  const mClass = margin === null ? '' : margin >= 40 ? 'margin-good' : margin >= 20 ? 'margin-warn' : 'margin-bad';
  const D = '—'; // guest dash

  const totalStatHtml = !isFullMode
    ? `<div class="detail-stat"><div class="label">ต้นทุนรวม</div><div class="value" style="color:var(--text-light)">${D}</div></div>`
    : cp.status === 'same'
      ? `<div class="detail-stat"><div class="label">ต้นทุนรวม</div><div class="value">฿${displayTotal.toFixed(2)}</div></div>`
      : `<div class="detail-stat"><div class="label">ต้นทุนรวม</div>
          <div class="value" style="font-size:18px">฿${displayTotal.toFixed(2)}</div>
          ${cp.status !== 'missing' ? `<div style="font-size:11px;color:var(--text-light);text-decoration:line-through;margin-top:2px">เดิม ฿${r.totalCost.toFixed(2)}</div>` : ''}
        </div>`;

  const perUnitStatHtml = !isFullMode
    ? `<div class="detail-stat"><div class="label">ต้นทุน / ชิ้น</div><div class="value" style="color:var(--text-light)">${D}</div></div>`
    : cp.status === 'same'
      ? `<div class="detail-stat"><div class="label">ต้นทุน / ชิ้น</div><div class="value green">฿${displayPerUnit.toFixed(2)}</div></div>`
      : `<div class="detail-stat"><div class="label">ต้นทุน / ชิ้น</div>
          <div class="value green" style="font-size:18px">฿${displayPerUnit.toFixed(2)}</div>
          ${cp.status !== 'missing' ? `<div style="font-size:11px;color:var(--text-light);text-decoration:line-through;margin-top:2px">เดิม ฿${r.costPerUnit.toFixed(2)}</div>` : ''}
        </div>`;

  document.getElementById('modal-stats').innerHTML = `
    ${totalStatHtml}
    <div class="detail-stat"><div class="label">Yield</div><div class="value">${r.yield} ชิ้น</div></div>
    ${perUnitStatHtml}
    ${isFullMode && r.sellingPrice > 0 ? `
    <div class="detail-stat"><div class="label">ราคาขาย / ชิ้น</div><div class="value">฿${r.sellingPrice.toFixed(2)}</div></div>
    <div class="detail-stat"><div class="label">กำไร / ชิ้น</div><div class="value green">฿${(r.sellingPrice - displayPerUnit).toFixed(2)}</div></div>
    <div class="detail-stat"><div class="label">Margin</div><div class="value"><span class="margin-badge ${mClass}">${margin !== null ? margin.toFixed(1) + '%' : D}</span></div></div>` : ''}`;

  // build item lookup for current prices
  const chocItems = cp.items.filter(x => x.type === 'choc');
  const ingItems  = cp.items.filter(x => x.type === 'ing');

  function itemRow(item) {
    if (!isFullMode) {
      return `<tr>
        <td>${esc(item.name)}</td>
        <td style="text-align:right">${item.grams.toFixed(1)}</td>
        <td style="text-align:right;color:var(--text-light)">—</td>
        <td style="text-align:right;color:var(--text-light)">—</td>
      </tr>`;
    }
    const savedCostStr   = item.savedCost !== null ? '฿' + item.savedCost.toFixed(2) : '—';
    const currentCostStr = item.currentCost !== null ? '฿' + item.currentCost.toFixed(2) : null;
    const cpgStr         = item.currentCpg !== null ? '฿' + item.currentCpg.toFixed(4) : '—';
    let costCell;
    if (item.missing) {
      costCell = `<div class="td-missing">ไม่พบราคาปัจจุบัน</div><div class="td-cost-saved">${savedCostStr}</div>`;
    } else if (cp.status === 'same' || Math.abs((item.currentCost - item.savedCost) / (item.savedCost || 1)) < 0.005) {
      costCell = currentCostStr || savedCostStr;
    } else {
      const dir = item.currentCost > item.savedCost ? 'up' : 'down';
      costCell = `<div class="td-cost-wrap">
        <div class="td-cost-current ${dir}">${currentCostStr}</div>
        <div class="td-cost-saved">${savedCostStr}</div>
      </div>`;
    }
    return `<tr>
      <td>${esc(item.name)}</td>
      <td style="text-align:right">${item.grams.toFixed(1)}</td>
      <td style="text-align:right">${cpgStr}</td>
      <td style="text-align:right">${costCell}</td>
    </tr>`;
  }

  // chocolate table
  let chocHtml = '';
  if (chocItems.length) {
    const chocCurrentTotal = chocItems.reduce((s,c) => s + (c.currentCost || c.savedCost || 0), 0);
    const chocFoot = isFullMode ? `<tfoot><tr><td colspan="3">รวมช็อกโกแลต</td><td>฿${chocCurrentTotal.toFixed(2)}</td></tr></tfoot>` : '';
    chocHtml = `
      <div class="choc-header-band">🍫 ช็อกโกแลต</div>
      <div class="choc-table-wrap">
        <table class="ingredient-table">
          <thead><tr><th>ชื่อ</th><th>กรัม</th><th>${isFullMode ? '฿/g (ปัจจุบัน)' : '฿/g'}</th><th>ต้นทุน</th></tr></thead>
          <tbody>${chocItems.map(itemRow).join('')}</tbody>
          ${chocFoot}
        </table>
      </div>`;
  }

  // ingredient table
  let ingHtml = '';
  if (ingItems.length) {
    const ingCurrentTotal = ingItems.reduce((s,i) => s + (i.currentCost || i.savedCost || 0), 0);
    const ingFoot = isFullMode ? `<tfoot><tr><td colspan="3">รวมวัตถุดิบ</td><td>฿${ingCurrentTotal.toFixed(2)}</td></tr></tfoot>` : '';
    ingHtml = `
      <div class="modal-section-label">วัตถุดิบอื่นๆ</div>
      <table class="ingredient-table">
        <thead><tr><th>ชื่อ</th><th>กรัม</th><th>${isFullMode ? '฿/g (ปัจจุบัน)' : '฿/g'}</th><th>ต้นทุน</th></tr></thead>
        <tbody>${ingItems.map(itemRow).join('')}</tbody>
        ${ingFoot}
      </table>`;
  }

  document.getElementById('modal-choc-section').innerHTML = bannerHtml + chocHtml;
  document.getElementById('modal-ing-section').innerHTML  = ingHtml;

  document.getElementById('detail-overlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('detail-overlay')) closeDetailModal(); }
function closeDetailModal() { document.getElementById('detail-overlay').classList.remove('open'); currentRecipe = null; }

function editRecipe() {
  if (!currentRecipe) return;
  closeDetailModal();
  editingId = currentRecipe.id;
  document.getElementById('form-title').textContent  = 'แก้ไขสูตร';
  document.getElementById('recipe-name').value       = currentRecipe.name;
  document.getElementById('recipe-yield').value      = currentRecipe.yield;
  document.getElementById('recipe-price').value      = currentRecipe.sellingPrice || '';
  setFormCategory(currentRecipe.category || '');
  document.getElementById('choc-rows').innerHTML = '';
  document.getElementById('ing-rows').innerHTML  = '';
  rowCount = 0;
  (currentRecipe.chocolates  || []).forEach(c => addChocRow(c));
  (currentRecipe.ingredients || []).forEach(i => addIngRow(i));
  recalc();
  showPanel('new');
}

async function deleteRecipe() {
  if (!currentRecipe) return;
  const pwd = prompt('กรอกรหัสผ่านเพื่อลบสูตร "' + currentRecipe.name + '"');
  if (pwd === null) return; // cancelled
  if (pwd !== DELETE_PASSWORD) { showToast('รหัสผ่านไม่ถูกต้อง', 'error'); return; }
  if (!confirm('ยืนยันลบสูตร "' + currentRecipe.name + '" จริงๆ ไหม? ไม่สามารถกู้คืนได้')) return;
  try {
    const res  = await fetch(GAS_URL + '?mode=deleteRecipe&id=' + currentRecipe.id);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showToast('ลบสูตรแล้ว', 'success');
    closeDetailModal();
    await loadRecipes();
  } catch(e) { showToast('ลบไม่สำเร็จ: ' + e.message, 'error'); }
}

// ── RESET ─────────────────────────────────────
function resetForm() {
  editingId = null;
  document.getElementById('form-title').textContent  = 'สร้างสูตรใหม่';
  document.getElementById('recipe-name').value       = '';
  document.getElementById('recipe-yield').value      = '1';
  document.getElementById('recipe-price').value      = '';
  document.getElementById('recipe-note').value       = '';
  document.getElementById('recipe-cat-select').value = '';
  document.getElementById('recipe-cat-new').value    = '';
  document.getElementById('recipe-cat-new').style.display = 'none';
  document.getElementById('cat-new-hint').style.display   = 'none';
  document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
  document.getElementById('choc-rows').innerHTML = '';
  document.getElementById('ing-rows').innerHTML  = '';
  rowCount = 0;
  addChocRow(); addIngRow();
  recalc();
}

// ── UTILS ─────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
