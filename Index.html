* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; min-height: 100vh; }
header { background: #1a1a1a; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 20px; font-weight: 800; }
header span { margin-left: auto; font-size: 13px; color: #888; }
main { max-width: 920px; margin: 0 auto; padding: 24px 16px; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
.card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.card p { color: #666; font-size: 14px; margin-bottom: 20px; }
.upload-zone { border: 2px dashed #d0d0d0; border-radius: 10px; padding: 48px 24px; text-align: center; cursor: pointer; background: #fafafa; transition: border-color 0.2s; }
.upload-zone:hover { border-color: #1a1a1a; }
.upload-zone .icon { font-size: 40px; margin-bottom: 10px; }
.upload-zone .title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.upload-zone .sub { color: #999; font-size: 13px; }
.btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
.btn-dark { background: #1a1a1a; color: #fff; }
.btn-green { background: #1e7e34; color: #fff; }
.btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
.btn:hover { opacity: 0.88; }
.date-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #f5f4f0; border-radius: 8px; margin-bottom: 16px; }
.date-row label { font-weight: 700; font-size: 15px; min-width: 60px; }
.date-row input { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 15px; font-weight: 700; width: 130px; }
.items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 16px; }
.item-row { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px; border: 1px solid #f0f0f0; background: #fafafa; }
.item-row.has-val { background: #f0fdf4; border-color: #bbf7d0; }
.item-row label { font-size: 12px; color: #555; flex: 1; line-height: 1.3; }
.item-row input { width: 52px; border: 1px solid #ddd; border-radius: 4px; padding: 3px 6px; font-size: 13px; text-align: right; background: #fff; }
.item-row.has-val input { font-weight: 700; }
.loading { text-align: center; padding: 32px; color: #666; }
.loading .spinner { font-size: 28px; display: block; margin-bottom: 10px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { padding: 12px 16px; background: #fff0f0; border-radius: 8px; color: #c00; font-size: 14px; margin-top: 12px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.top-bar .back { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; color: #666; }
.preview-img { width: 100%; border-radius: 8px; border: 1px solid #eee; margin-bottom: 12px; }
.section-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; grid-column: 1 / -1; padding: 8px 4px 2px; border-top: 1px solid #e8e8e8; margin-top: 4px; }
.section-label:first-child { border-top: none; margin-top: 0; }
canvas { display: none; }
.api-key-row { display: flex; gap: 8px; margin-bottom: 16px; }
.api-key-row input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
.api-key-row input::placeholder { color: #bbb; }
.api-key-row .save-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
.api-note { font-size: 12px; color: #888; margin-bottom: 16px; }
.step-indicator { display: flex; gap: 8px; margin-bottom: 20px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.step-dot.active { background: #1a1a1a; }
@media (max-width: 600px) {
  .items-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

function render() {
  const app = document.getElementById("app");
  if (state.step === "apikey") app.innerHTML = renderApiKey();
  else if (state.step === "upload") app.innerHTML = renderUpload();
  else if (state.step === "loading") app.innerHTML = renderLoading();
  else if (state.step === "confirm") app.innerHTML = renderConfirm();
  else if (state.step === "done") app.innerHTML = renderDone();
  bindEvents();
}

function stepDots(active) {
  const steps = ["upload","loading","confirm","done"];
  const idx = steps.indexOf(active);
  return `<div class="step-indicator">${steps.map((s,i) =>
    `<div class="step-dot ${i<=idx?'active':''}"></div>`
  ).join("")}</div>`;
}

function saveApiKey() {

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const mime = file.type || "image/jpeg";
  const b64 = await new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
  setState({ imageBase64: b64, imageMime: mime, step: "loading", error: "" });
  await parseImage(b64, mime);
}

async function parseImage(b64, mime) {
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": state.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },

        model: "claude-opus-4-5",
        max_tokens: 4000,

}

function updateItem(input) {
  const key = input.dataset.key;
  const val = Number(input.value) || 0;
  state.data[key] = val;
  input.closest(".item-row").className = "item-row" + (val > 0 ? " has-val" : "");
}

function handleConfirm() {
  // sync date
  const dateEl = document.getElementById("dateInput");
  if (dateEl) state.data.date = dateEl.value;
  const url = buildFormUrl(state.data);
  const jpeg = drawJpeg(state.data);
  setState({ formUrl: url, jpegUrl: jpeg, step: "done" });
}

function resetApp() {
  setState({ step: "upload", imageBase64: null, data: {}, formUrl: "", jpegUrl: "", error: "" });
}

// ============================================================
// FORM URL
// ============================================================
function buildFormUrl(data) {
  const params = [`entry.37045481=${encodeURIComponent(data.date || "")}`];
  Object.entries(ENTRY_MAP).forEach(([label, entryId]) => {
    if (label === "วันที่") return;
    params.push(`${entryId}=${encodeURIComponent(data[label] || 0)}`);
  });
  return FORM_BASE + "&" + params.join("&");
}

// ============================================================
// JPEG CANVAS
// ============================================================
function drawJpeg(data) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 1080; canvas.height = 1080;

  const white = "#ffffff", border = "#e0e0e0", secBg = "#f0f0eb";
  const textDark = "#111", textMid = "#333", textLight = "#aaa", textNone = "#ccc";

  ctx.fillStyle = secBg; ctx.fillRect(0,0,1080,1080);

  // Header
  ctx.fillStyle = white; ctx.fillRect(0,0,1080,72);
  ctx.strokeStyle = border; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,72); ctx.lineTo(1080,72); ctx.stroke();
  ctx.fillStyle = textLight; ctx.font = "bold 11px sans-serif";
  ctx.fillText("สรุปยอดขาย", 36, 26);
  ctx.fillStyle = textDark; ctx.font = "bold 32px sans-serif";
  ctx.fillText(data.date || "", 36, 58);
  ctx.fillStyle = textLight; ctx.font = "13px sans-serif";
  const sub = "Test + ขาย"; ctx.fillText(sub, 1080-36-ctx.measureText(sub).width, 58);

  // Footer
  ctx.fillStyle = white; ctx.fillRect(0,1020,1080,60);
  ctx.strokeStyle = border; ctx.beginPath(); ctx.moveTo(0,1020); ctx.lineTo(1080,1020); ctx.stroke();
  ctx.fillStyle = textLight; ctx.font = "12px sans-serif"; ctx.fillText("ปิดรอบเงินสด", 36, 1042);
  ctx.fillStyle = textDark; ctx.font = "bold 18px sans-serif";
  ctx.fillText(Number(data["ปิดรอบเงินสด"]||0).toLocaleString()+" บาท", 36, 1062);

  const colW = 360, bodyH = 948;
  const cols = [COL1, COL2, COL3];
  const secLabels = [["กลุ่มที่ 1",17,"อื่นๆ",21], ["Bon Bon",15,"Almond เคลือบช็อก",21], ["อื่นๆ 2",22,"กลุ่มที่ 4",26]];

  cols.forEach((items, ci) => {
    const x = ci * colW;
    ctx.fillStyle = white; ctx.fillRect(x,72,colW,bodyH);
    if (ci>0) { ctx.strokeStyle="#e8e8e8"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x,72); ctx.lineTo(x,1020); ctx.stroke(); }

    const rowH = bodyH / (items.length + 2);
    let ri = 0;

    const drawSec = (label) => {
      const y = 72 + ri*rowH;
      ctx.fillStyle = secBg; ctx.fillRect(x,y,colW,rowH*0.85);
      ctx.fillStyle = "#999"; ctx.font = "bold 11px sans-serif";
      ctx.fillText(label.toUpperCase(), x+18, y+rowH*0.6);
      ri++;
    };

    const drawRow = (label, key) => {
      const y = 72 + ri*rowH;
      const val = data[key]; const hasVal = val && Number(val)>0;
      ctx.fillStyle = ri%2===0?"#fafafa":white; ctx.fillRect(x,y,colW,rowH);
      ctx.strokeStyle="#f0f0f0"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x,y+rowH); ctx.lineTo(x+colW,y+rowH); ctx.stroke();
      ctx.fillStyle = textMid; ctx.font = "25px sans-serif"; ctx.fillText(label, x+18, y+rowH*0.68);
      const vStr = hasVal?String(val):"-";
      ctx.fillStyle = hasVal?textDark:textNone;
      ctx.font = hasVal?"bold 27px sans-serif":"25px sans-serif";
      ctx.fillText(vStr, x+colW-18-ctx.measureText(vStr).width, y+rowH*0.68);
      ri++;
    };

    const [s1,n1,s2] = secLabels[ci];
    drawSec(s1);
    items.slice(0,n1).forEach(([l,k])=>drawRow(l,k));
    drawSec(s2);
    items.slice(n1).forEach(([l,k])=>drawRow(l,k));
  });

  return canvas.toDataURL("image/jpeg", 0.94);
}
