// ---------- utils ----------
function norm(s){ return (s||"").replace(/[\u2018\u2019\u2032`]/g,"'").replace(/\s+/g," ").trim().toLowerCase(); }
function $(id){ return document.getElementById(id); }
function msg(t, cls){ const m=$("msg"); m.textContent=t; m.className="msg show "+cls; }
function hideMsg(){ $("msg").className="msg"; }

// ---------- config ----------
function saveCfg(){
  localStorage.setItem("lv_url", $("cfgUrl").value.trim());
  localStorage.setItem("lv_key", $("cfgKey").value.trim());
  msg("บันทึกการตั้งค่าแล้ว", "ok");
}
function loadCfg(){
  $("cfgUrl").value = localStorage.getItem("lv_url") || "";
  $("cfgKey").value = localStorage.getItem("lv_key") || "";
}

let DATA = null; // ผลรวมล่าสุด { rows:[{...catalog, total}], extra:[{name,total}], date }

// ---------- ดึง + รวมตาม CATALOG ----------
async function loadDay(){
  const url = localStorage.getItem("lv_url"), key = localStorage.getItem("lv_key");
  if(!url || !key){ msg("กรุณาตั้งค่า URL + key ก่อน", "err"); return; }
  const date = $("date").value;
  if(!date){ msg("เลือกวันที่ก่อน", "err"); return; }

  $("btnGo").disabled = true; $("btnJpg").disabled = true;
  msg("กำลังดึงข้อมูลจาก Loyverse...", "load");
  try{
    const res = await fetch(url + "?key=" + encodeURIComponent(key) + "&date=" + encodeURIComponent(date));
    const json = await res.json();
    if(json.error) throw new Error(json.error);

    // เตรียมช่องตาม CATALOG
    const rows = CATALOG.map(c => ({ ...c, sale:0, test:0, total:0, hit:false }));
    const used = new Set();      // sku ที่ลงช่องแล้ว
    const apiItems = json.items || [];

    // 1) ลง split ก่อน (item + variant ตรง list)
    apiItems.forEach((ai, idx) => {
      const an = norm(ai.item_name), av = norm(ai.variant);
      for(const r of rows){
        if(r.manual) continue;
        if(norm(r.item)!==an) continue;
        if(!r.saleV && !r.testV) continue; // เฉพาะ split
        const inSale = (r.saleV||[]).some(v=>norm(v)===av);
        const inTest = (r.testV||[]).some(v=>norm(v)===av);
        if(inSale){ r.sale+=ai.sale; r.test+=ai.test; r.hit=true; used.add(idx); break; }
        if(inTest){ r.test+=ai.test; r.sale+=ai.sale; r.hit=true; used.add(idx); break; }
      }
    });
    // 2) ลง catch-all (item ตรง, ไม่ใช่ split)
    apiItems.forEach((ai, idx) => {
      if(used.has(idx)) return;
      const an = norm(ai.item_name);
      for(const r of rows){
        if(r.manual || r.saleV || r.testV) continue;
        if(norm(r.item)===an){ r.sale+=ai.sale; r.test+=ai.test; r.hit=true; used.add(idx); break; }
      }
    });
    // 3) ที่เหลือ -> อื่นๆ เพิ่มเติม
    const extraMap = {};
    apiItems.forEach((ai, idx) => {
      if(used.has(idx)) return;
      const k = ai.item_name;
      if(!extraMap[k]) extraMap[k] = { name:k, sale:0, test:0 };
      extraMap[k].sale += ai.sale; extraMap[k].test += ai.test;
    });

    rows.forEach(r => r.total = r.sale + r.test);
    const extra = Object.values(extraMap).map(e => ({ name:e.name, total:e.sale+e.test })).filter(e=>e.total!==0);
    DATA = { rows, extra, date, meta: json.meta };
    renderTable();
    msg("ดึงสำเร็จ ✓ ใบขาย " + json.meta.receipts + " | refund " + json.meta.refunds + " — ตรวจแล้วกดสร้าง JPEG", "ok");
    $("btnJpg").disabled = false;
  }catch(err){
    msg("ดึงไม่สำเร็จ: " + err.message, "err");
  }finally{
    $("btnGo").disabled = false;
  }
}

// ---------- แสดงตาราง (แก้ค่าได้) ----------
function renderTable(){
  if(!DATA){ return; }
  let html = "<table><thead><tr><th>รายการ</th><th class='n'>เติม (ขาย+Test)</th></tr></thead><tbody>";
  let lastGroup = "";
  DATA.rows.forEach((r,i) => {
    if(r.group!==lastGroup){ html += "<tr class='grp'><td colspan='2'>"+r.group+"</td></tr>"; lastGroup=r.group; }
    html += "<tr><td>"+r.form+"</td><td class='n'><input type='number' value='"+r.total+"' onchange='editVal("+i+",this.value)'></td></tr>";
  });
  if(DATA.extra.length){
    html += "<tr class='grp'><td colspan='2'>อื่นๆ เพิ่มเติม (ไม่อยู่ในฟอร์ม)</td></tr>";
    DATA.extra.forEach((e,i) => {
      html += "<tr class='extra'><td>"+e.name+"</td><td class='n'><input type='number' value='"+e.total+"' onchange='editExtra("+i+",this.value)'></td></tr>";
    });
  }
  html += "</tbody></table>";
  $("result").innerHTML = html;
}
function editVal(i,v){ DATA.rows[i].total = Number(v)||0; }
function editExtra(i,v){ DATA.extra[i].total = Number(v)||0; }

// ---------- วาด JPEG 1080x1920 ----------
function makeJpg(){
  if(!DATA){ return; }
  const cv = $("cv"), x = cv.getContext("2d");
  x.fillStyle = "#fff"; x.fillRect(0,0,1080,1920);

  // header
  x.fillStyle = "#999"; x.font = "22px Sarabun, sans-serif";
  x.fillText("สรุปยอดขาย", 40, 40);
  x.fillStyle = "#111"; x.font = "700 60px Sarabun, sans-serif";
  const d = DATA.date.split("-"); // YYYY-MM-DD -> D/M/YY(พ.ศ.)
  const thYear = (Number(d[0]) + 543) % 100;
  x.fillText(parseInt(d[2])+"/"+parseInt(d[1])+"/"+thYear, 40, 100);
  x.fillStyle = "#bbb"; x.font = "22px Sarabun, sans-serif"; x.textAlign = "right";
  x.fillText("Test + ขาย", 1040, 40); x.textAlign = "left";

  // จัดข้อมูลเป็น 3 คอลัมน์
  const cols = { L:[], M:[], R:[] };
  let lastG = {};
  DATA.rows.forEach(r => {
    if(lastG[r.col]!==r.group){ cols[r.col].push({type:"grp", text:r.group}); lastG[r.col]=r.group; }
    cols[r.col].push({type:"row", name:r.form, val:r.total});
  });
  DATA.extra.forEach((e,i) => {
    if(i===0) cols.R.push({type:"grp", text:"อื่นๆ เพิ่มเติม"});
    cols.R.push({type:"row", name:e.name, val:e.total});
  });

  // วาดแต่ละคอลัมน์
  const colX = { L:40, M:392, R:744 }, colW = 308;
  const top = 150, bottom = 1850;
  Object.keys(cols).forEach(c => {
    const items = cols[c];
    const rowH = Math.min(46, Math.max(26, (bottom-top)/Math.max(items.length,1)));
    let y = top;
    items.forEach(it => {
      if(it.type==="grp"){
        x.fillStyle="#eee"; x.fillRect(colX[c], y-rowH+8, colW, rowH-4);
        x.fillStyle="#777"; x.font="600 "+Math.min(16,rowH*0.42)+"px Sarabun, sans-serif";
        x.fillText(it.text.toUpperCase(), colX[c]+6, y);
      } else {
        x.fillStyle="#222"; x.font=Math.min(26,rowH*0.6)+"px Sarabun, sans-serif";
        let nm = it.name; while(x.measureText(nm).width > colW-70 && nm.length>4){ nm=nm.slice(0,-2); }
        x.fillText(nm, colX[c], y);
        x.textAlign="right";
        if(it.val>0){ x.fillStyle="#111"; x.font="700 "+Math.min(34,rowH*0.78)+"px Sarabun, sans-serif"; x.fillText(it.val, colX[c]+colW, y); }
        else { x.fillStyle="#ccc"; x.font="24px Sarabun, sans-serif"; x.fillText("−", colX[c]+colW, y); }
        x.textAlign="left";
        x.strokeStyle="#f0f0f0"; x.beginPath(); x.moveTo(colX[c],y+6); x.lineTo(colX[c]+colW,y+6); x.stroke();
      }
      y += rowH;
    });
  });

  // export
  const dataUrl = cv.toDataURL("image/jpeg", 0.92);
  const a = document.createElement("a");
  a.href = dataUrl; a.download = "32barx-สรุปยอดขาย-"+DATA.date+".jpg"; a.click();
  msg("สร้าง JPEG แล้ว ✓ (ดาวน์โหลดอัตโนมัติ)", "ok");
}

// init
loadCfg();
$("date").value = new Date().toISOString().slice(0,10);
</script>
</body>
